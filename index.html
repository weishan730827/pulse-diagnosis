<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九家并列脉诊辨证体系 v6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f7f4ed;color:#3a2a1a;line-height:1.7}
.header{background:linear-gradient(135deg,#1a0f0a,#3d2014);color:#e8d5b0;padding:24px 20px;text-align:center}
.header h1{font-size:22px;letter-spacing:3px}
.header .sub{font-size:11px;color:#b8a080;margin-top:4px}

.container{max-width:1400px;margin:0 auto;padding:16px}

/* 步骤 */
.step{background:#fff;border-radius:10px;padding:18px 22px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.step-num{display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;background:#8b6914;color:#fff;border-radius:50%;font-size:13px;font-weight:700;margin-right:8px}
.step-title{font-size:15px;font-weight:700;color:#2c1810}
.step-desc{font-size:11px;color:#888;margin:4px 0 10px 34px}

/* 医家选择条 */
.school-bar{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px 34px}
.school-chip{padding:6px 14px;font-size:11px;border:2px solid #e5d9c5;border-radius:6px;background:#fdfbf7;cursor:pointer;transition:.2s;white-space:nowrap}
.school-chip:hover{border-color:#8b6914}
.school-chip.active{background:#8b6914;color:#fff;border-color:#8b6914;font-weight:600}
.school-chip .hint{font-size:9px;opacity:0.7;display:block;line-height:1.2}

/* 表单区域 */
.form-area{margin-left:34px;min-height:80px}
.form-placeholder{color:#aaa;font-size:12px;text-align:center;padding:30px}

/* 各家专属表单 */
.school-form{display:none;padding:14px;background:#fefdf9;border:1px solid #e8d5b7;border-radius:8px}
.school-form.active{display:block}
.school-form h3{font-size:13px;color:#8b6914;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e8d5b7}
.school-form .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.school-form .form-cell{flex:1;min-width:130px}
.school-form .form-cell label{font-size:10px;color:#777;display:block;margin-bottom:2px}
.school-form .form-cell select,.school-form .form-cell input{width:100%;padding:6px 8px;font-size:11px;border:1px solid #ddd;border-radius:4px;background:#fff}
.school-form .form-cell select:focus{border-color:#8b6914;outline:none}
.school-form .note{font-size:10px;color:#999;margin-top:6px;font-style:italic}
.zong-an{display:flex;gap:10px;margin-bottom:8px}
.zong-an>div{flex:1;padding:8px 10px;border:2px solid #d4c4a0;border-radius:6px;background:#fffef8}

/* 症状 */
.chip-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip-grid label{font-size:11px;padding:3px 8px;border:1px solid #e0d5c0;border-radius:3px;cursor:pointer;background:#fafaf7}
.chip-grid label:hover{background:#fdf3d5}
.chip-grid label.selected{background:#8b6914;color:#fff;border-color:#8b6914}
.chip-grid label.required{border-color:#c0392b;background:#fdf2f2}

/* 结果区 */
.result-box{margin:12px 0 0 34px;padding:14px;background:#fefdf9;border-left:4px solid #8b6914;border-radius:4px;display:none}
.result-box h4{font-size:13px;color:#2c1810;margin-bottom:4px}
.result-box .tag{font-size:9px;background:#f0e6d2;color:#8b6914;padding:2px 6px;border-radius:3px;margin-left:6px}
.result-box .output{font-size:11px;color:#555;line-height:1.8;margin-top:6px}
.result-box .output b{color:#8b6914}
.result-box .warn{color:#c0392b;font-weight:600}

.btn{display:inline-block;padding:8px 24px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.btn-primary{background:#8b6914;color:#fff}.btn-primary:hover{background:#6b4f10}
.btn-outline{background:transparent;color:#8b6914;border:1px solid #8b6914}
.btn-sm{padding:4px 12px;font-size:11px}
.toolbar{text-align:center;padding:10px;font-size:11px;color:#a09080}
.toolbar a{color:#8b6914;text-decoration:none;margin:0 8px}
.toolbar a:hover{text-decoration:underline}
</style>
<script src="diagnosis_engine.js"></script>
</head>
<body>

<div class="header">
<h1>九家并列脉诊辨证体系</h1>
<div class="sub">选医家 → 各家用各自专属脉诊表 → 按各自体系独立辨证</div>
</div>

<div class="toolbar">
<a href="jiujia_maizhen.html">通用查询工具</a> ·
<a href="pulse-diagnosis_project_index.md">文件索引</a> ·
<a href="使用手册_v2.md">使用手册</a> ·
<a href="SYSTEM_CHAIN.md">系统链</a>
</div>

<div class="container">

<!-- 第一步：选择医家 -->
<div class="step">
<span class="step-num">1</span><span class="step-title">选择医家</span>
<p class="step-desc">每家辨证体系不同，脉诊表格也不同。选一家开始，或选多家并列对比。</p>

<div class="school-bar" id="schoolBar"></div>
<div style="margin-left:34px;margin-top:6px">
<button class="btn btn-sm btn-primary" onclick="selectReco()">推荐组合</button>
<button class="btn btn-sm btn-outline" onclick="selectAll()">全选</button>
<button class="btn btn-sm btn-outline" onclick="clearSel()">清空</button>
<span style="font-size:11px;color:#999;margin-left:8px" id="selCount">未选</span>
</div>
</div>

<!-- 第二步：填写各家专属脉诊表 -->
<div class="step">
<span class="step-num">2</span><span class="step-title">填写脉诊数据</span>
<p class="step-desc">根据选中医家的体系填写其专属脉诊表。每家关注的脉诊维度不同。</p>

<div class="form-area" id="formArea">
<div class="form-placeholder">请先在第一步选择至少一家医体。</div>
</div>
</div>

<!-- 第三步：主诉与症状 -->
<div class="step">
<span class="step-num">3</span><span class="step-title">主诉与症状（通用）</span>
<p class="step-desc">此处为所有选中医家共用的症状信息。部分医家（刘渡舟、郑钦安）以此为主驱动。</p>

<div style="margin-left:34px">
<textarea id="chiefComplaint" rows="2" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:12px;margin-bottom:10px" placeholder="主诉：例：胸闷气短三日，动则加剧，畏寒怕冷，大便溏泻..."></textarea>
<div class="chip-grid" id="symGrid"></div>
</div>
</div>

<!-- 第四步：辨证执行 -->
<div class="step">
<span class="step-num">4</span><span class="step-title">辨证执行</span>
<p class="step-desc">各家按自身体系独立辨证，输出格式互不相同。</p>

<div style="margin-left:34px">
<button class="btn btn-primary" onclick="runAll()">开始辨证</button>
</div>
<div id="results"></div>
</div>

</div>

<script>
// ========== 九家定义 ==========
var schools = [
  {
    id:'zhangxichun', name:'张锡纯', system:'气机升降辨证', era:'清末民初',
    pulseFields:'left-right-contrast',
    description:'核心：辨左右虚实 → 定升降方向。总按定左右，单按定脏腑。弦脉/硬脉是关键。',
    formId:'zxForm'
  },
  {
    id:'zhangzhongjing', name:'张仲景', system:'六经辨证', era:'东汉',
    pulseFields:'six-meridian',
    description:'核心：六经主脉定位。太阳浮、阳明大、少阳弦、太阴缓、少阴微细、厥阴弦细。',
    formId:'zjForm'
  },
  {
    id:'huxishu', name:'胡希恕', system:'六经八纲脉证辨证', era:'近代',
    pulseFields:'three-step-bagang',
    description:'核心：脉诊三步法定乾坤——浮沉定病位、迟数定寒热、沉取有力无力定虚实。26脉象三分法（脉动/脉体/血行），103方症候群+特征脉精确匹配。',
    formId:'hxForm'
  },
  {
    id:'chenjianguo', name:'陈建国', system:'三部九候脉诊', era:'当代',
    pulseFields:'three-layer-nine-position',
    description:'核心：六步定向法，浮中沉×寸关尺九候。50方脉位签名库精确匹配。纯脉诊驱动。',
    formId:'cjForm'
  },
  {
    id:'yaomeiling', name:'姚梅龄', system:'脉学分层辨证', era:'当代',
    pulseFields:'six-dimension',
    description:'核心：六维分层（位·体·力·率·律·形）。pulse_db.json检索。知医邦28脉量化直接适用。',
    formId:'ymForm'
  },
  {
    id:'liuduzhou', name:'刘渡舟', system:'十论分诊辨证', era:'当代',
    pulseFields:'symptom-driven',
    description:'核心：症状驱动（水证·气机·脾胃），脉象辅助六经定位。症状关键词为必填。',
    formId:'ldForm'
  },
  {
    id:'huangyuanyu', name:'黄元御', system:'一气周流辨证', era:'清代',
    pulseFields:'zhongqi-guan',
    description:'核心：右关定中气，寸关尺一气升降。24脉12对阴阳。右关为必采。',
    formId:'hyForm'
  },
  {
    id:'caoyingfu', name:'曹颖甫', system:'方证对应辨证', era:'近代',
    pulseFields:'left-right-basic',
    description:'核心：左右分诊 + 92案脉证映射。病汗药汗鉴别。脉证精准对应。',
    formId:'cyForm'
  },
  {
    id:'zhengqinan', name:'郑钦安', system:'阴阳辨证', era:'清代',
    pulseFields:'chi-yang',
    description:'核心：尺脉辨真阳 + 三问定阴阳。假热真寒鉴别。尺脉必查。',
    formId:'znForm'
  }
];

var activeSchool = null;
var selectedSchools = {};

// ========== 渲染医家选择条 ==========
var barHtml='';
for(var i=0;i<schools.length;i++){
  var s=schools[i];
  barHtml+='<div class="school-chip" id="chip_'+s.id+'" onclick="toggleSchool(\''+s.id+'\')">'+s.name+'<span class="hint">'+s.system+'</span></div>';
}
document.getElementById('schoolBar').innerHTML=barHtml;

// ========== 渲染症状网格 ==========
var allSyms=['发热','恶寒','畏寒','寒热往来','自汗','盗汗','无汗','头痛','头晕','眩晕',
  '胸闷','心悸','气短','咳嗽','痰多','恶心','呕吐','呃逆','嗳气','反酸',
  '腹胀','腹痛','便秘','便溏','腹泻','小便不利','小便频数','水肿','浮肿',
  '口苦','口干','口渴','不渴','咽干','目眩','耳鸣','失眠','嗜睡','乏力',
  '纳差','肢冷','手足厥冷','麻木','腰酸','腰冷','面色萎黄','面色晄白','潮热','烦躁',
  '胸胁苦满','心下痞','脐下悸','气上冲','身重','黄疸'];
var sh='';
for(var i=0;i<allSyms.length;i++){
  sh+='<label id="sym_'+i+'" onclick="this.classList.toggle(\'selected\')">'+allSyms[i]+'</label>';
}
document.getElementById('symGrid').innerHTML=sh;

// ========== 渲染各家专属表单 ==========
var formHtml='';

// --- 张锡纯：左右虚实对比 ---
formHtml+='<div class="school-form" id="zxForm"><h3>张锡纯 · 气机升降辨证 — 左右虚实对比</h3>';
formHtml+='<div class="zong-an"><div><div style="font-size:11px;font-weight:700;color:#8b6914;margin-bottom:4px">左手总按</div>';
formHtml+='<select id="zx_zongL"><option value="">--脉形</option><option>弦</option><option>细</option><option>弱</option><option>浮</option><option>沉</option><option>洪</option><option>滑</option><option>涩</option><option>数</option><option>迟</option><option>大</option><option>硬</option></select>';
formHtml+='<select id="zx_zongLF" style="margin-top:3px"><option value="">--力度</option><option>有力</option><option>无力</option><option>弦硬</option><option>弦无力</option><option>按之即无</option></select></div>';
formHtml+='<div><div style="font-size:11px;font-weight:700;color:#8b6914;margin-bottom:4px">右手总按</div>';
formHtml+='<select id="zx_zongR"><option value="">--脉形</option><option>弦</option><option>细</option><option>弱</option><option>浮</option><option>沉</option><option>洪</option><option>滑</option><option>涩</option><option>数</option><option>迟</option><option>大</option><option>硬</option></select>';
formHtml+='<select id="zx_zongRF" style="margin-top:3px"><option value="">--力度</option><option>有力</option><option>无力</option><option>弦硬</option><option>弦无力</option><option>按之即无</option></select></div></div>';
formHtml+='<div class="form-row">'+buildPosSelect('zx','左寸')+buildPosSelect('zx','左关')+buildPosSelect('zx','左尺')+'</div>';
formHtml+='<div class="form-row">'+buildPosSelect('zx','右寸')+buildPosSelect('zx','右关')+buildPosSelect('zx','右尺')+'</div>';
formHtml+='<div class="note">张氏辨证核心：总按左右对比为第一层，单按脏腑定位为第二层。左弦硬+右弦硬=胃气上逆用赭石；左右皆虚=大气下陷用升陷汤。</div></div>';

// --- 陈建国：三部九候六步 ---
formHtml+='<div class="school-form" id="cjForm"><h3>陈建国 · 三部九候脉诊 — 六步定向法</h3>';
formHtml+='<div class="zong-an"><div><div style="font-size:11px;font-weight:700;color:#8b6914;margin-bottom:4px">第一步：总体</div>';
formHtml+='<select id="cj_step1"><option value="">--</option><option>太过</option><option>不及</option></select></div>';
formHtml+='<div><div style="font-size:11px;font-weight:700;color:#8b6914;margin-bottom:4px">第二步：方向</div>';
formHtml+='<select id="cj_step2m"><option value="">--方法</option><option>升法</option><option>降法</option></select>';
formHtml+='<select id="cj_step2q" style="margin-top:3px"><option value="">--四象</option><option>阴盛</option><option>阳盛</option><option>阴虚</option><option>阳虚</option></select></div></div>';
formHtml+='<p style="font-size:11px;font-weight:700;color:#555;margin:8px 0 4px">第三步：三部逐位（太过/不及/正常）× 第四步：浮中沉</p>';
formHtml+='<div class="form-row">'+chenPos('cj','左寸')+chenPos('cj','左关')+chenPos('cj','左尺')+'</div>';
formHtml+='<div class="form-row">'+chenPos('cj','右寸')+chenPos('cj','右关')+chenPos('cj','右尺')+'</div>';
formHtml+='<p style="font-size:11px;font-weight:700;color:#555;margin:8px 0 4px">第五步：脉质（拘急/有力/无力/管细）</p>';
formHtml+='<div class="form-row">'+chenQ('cj','左寸')+chenQ('cj','左关')+chenQ('cj','左尺')+'</div>';
formHtml+='<div class="form-row">'+chenQ('cj','右寸')+chenQ('cj','右关')+chenQ('cj','右尺')+'</div>';
formHtml+='<div class="note">陈氏六步定向法：必须完成六步全部填写才能启动50方脉位签名匹配。这是纯脉诊体系，不依赖症状。</div></div>';

// --- 姚梅龄：六维分层 ---
formHtml+='<div class="school-form" id="ymForm"><h3>姚梅龄 · 脉学分层辨证 — 六维采集</h3>';
formHtml+='<div class="form-row"><div class="form-cell"><label>脉位（总体）</label><select id="ym_wei"><option value="">--</option><option>浮</option><option>中</option><option>沉</option><option>伏</option></select></div>';
formHtml+='<div class="form-cell"><label>脉体</label><select id="ym_ti"><option value="">--</option><option>大</option><option>细</option><option>长</option><option>短</option></select></div>';
formHtml+='<div class="form-cell"><label>脉力</label><select id="ym_li"><option value="">--</option><option>有力</option><option>无力</option><option>虚</option><option>实</option></select></div>';
formHtml+='<div class="form-cell"><label>脉率</label><select id="ym_lv"><option value="">--</option><option>数</option><option>迟</option><option>缓</option><option>疾</option></select></div>';
formHtml+='<div class="form-cell"><label>脉律</label><select id="ym_lu"><option value="">--</option><option>整齐</option><option>促</option><option>结</option><option>代</option></select></div></div>';
formHtml+='<div class="form-row"><div class="form-cell"><label>脉形（可多描述）</label><input type="text" id="ym_xing" placeholder="如：弦、滑、涩、紧"></div>';
formHtml+='<div class="form-cell"><label>左右差异</label><input type="text" id="ym_lr" placeholder="如：左弦右弱"></div></div>';
formHtml+='<div class="note">姚氏六维分层：脉位→脉体→脉力→脉率→脉律→脉形。知医邦28脉代码直接映射至脉形维度。每维度独立记录，比单脉名描述精确得多。</div>';
formHtml+='<div style="margin-top:8px"><label style="font-size:10px">知医邦28脉代码（可选）</label><input type="text" id="ym_zhiyi" style="width:100%;padding:4px;font-size:11px;border:1px solid #ddd;border-radius:3px" placeholder="例：EA IB CC ..."></div></div>';

// --- 张仲景：六经定位 ---
formHtml+='<div class="school-form" id="zjForm"><h3>张仲景 · 六经辨证 — 六经主脉定位</h3>';
formHtml+='<div class="form-row"><div class="form-cell"><label>总体脉象</label><select id="zj_pulse"><option value="">--</option><option>浮</option><option>沉</option><option>弦</option><option>细</option><option>微</option><option>洪</option><option>大</option><option>滑</option><option>涩</option><option>数</option><option>迟</option><option>紧</option><option>缓</option><option>弱</option></select></div>';
formHtml+='<div class="form-cell"><label>力度</label><select id="zj_force"><option value="">--</option><option>有力</option><option>无力</option></select></div>';
formHtml+='<div class="form-cell"><label>左右侧重</label><select id="zj_lr"><option value="">--</option><option>左盛</option><option>右盛</option><option>均衡</option></select></div></div>';
formHtml+='<div class="note">六经主脉定位：太阳浮、阳明大、少阳弦、太阴缓弱、少阴微细、厥阴弦细欲绝。需结合症状（寒热/汗出/二便）确定六经归属。</div></div>';

// --- 黄元御：右关中气 ---
formHtml+='<div class="school-form" id="hyForm"><h3>黄元御 · 一气周流 — 右关中气 + 24脉阴阳</h3>';
formHtml+='<div class="zong-an"><div><div style="font-size:11px;font-weight:700;color:#8b6914;margin-bottom:4px">右关（中气）<span style="color:#c0392b">★必填</span></div>';
formHtml+='<select id="hy_guan"><option value="">--脉形</option><option>缓</option><option>弱</option><option>濡</option><option>弦</option><option>硬</option><option>滑</option><option>涩</option><option>沉</option><option>浮</option></select>';
formHtml+='<select id="hy_guanF" style="margin-top:3px"><option value="">--力度</option><option>有力</option><option>无力</option></select></div>';
formHtml+='<div><div style="font-size:11px;font-weight:700;color:#8b6914;margin-bottom:4px">左手总体</div>';
formHtml+='<select id="hy_left"><option value="">--</option><option>弦</option><option>细</option><option>沉</option><option>浮</option><option>涩</option><option>大</option></select></div>';
formHtml+='<div><div style="font-size:11px;font-weight:700;color:#8b6914;margin-bottom:4px">右手总体</div>';
formHtml+='<select id="hy_right"><option value="">--</option><option>弦</option><option>沉</option><option>浮</option><option>滑</option><option>涩</option></select></div></div>';
formHtml+='<div class="note">右关为中气之枢。右关弱/缓/濡 → 中气不足用黄芽汤。右关弦硬 → 木郁克土用达郁汤。左弦右沉 → 肝升太过肺降不及。</div></div>';

// --- 郑钦安：尺脉真阳 ---

// ========== 选择逻辑 ==========
function toggleSchool(id){
  if(selectedSchools[id]) delete selectedSchools[id];
  else selectedSchools[id]=true;
  updateUI();
}
function selectAll(){for(var i=0;i<schools.length;i++) selectedSchools[schools[i].id]=true; updateUI();}
function clearSel(){selectedSchools={}; updateUI();}
function selectReco(){
  selectedSchools={};
  selectedSchools['zhangxichun']=true;
  selectedSchools['zhangzhongjing']=true;
  selectedSchools['chenjianguo']=true;
  selectedSchools['zhengqinan']=true;
  updateUI();
}

function updateUI(){
  // 更新chip高亮
  for(var i=0;i<schools.length;i++){
    var chip=document.getElementById('chip_'+schools[i].id);
    chip.classList.toggle('active',!!selectedSchools[schools[i].id]);
  }
  
  var count=Object.keys(selectedSchools).length;
  document.getElementById('selCount').textContent='已选 '+count+' 家';
  
  // 显示/隐藏各家表单
  var selIds=Object.keys(selectedSchools);
  var allForms=document.querySelectorAll('.school-form');
  for(var i=0;i<allForms.length;i++) allForms[i].classList.remove('active');
  
  if(selIds.length===0){
    document.getElementById('formPlaceholder').style.display='block';
    return;
  }
  document.getElementById('formPlaceholder').style.display='none';
  
  // 显示选中医家表单
  for(var i=0;i<selIds.length;i++){
    var s=schools.find(function(x){return x.id===selIds[i];});
    if(s){
      var f=document.getElementById(s.formId);
      if(f) f.classList.add('active');
    }
  }
}

// ========== 辨证执行 ==========
function runAll(){
  var selIds = Object.keys(selectedSchools);
  if (selIds.length === 0) { alert('请先选择医家'); return; }
  
  var syms = [];
  document.querySelectorAll('#symGrid label.selected').forEach(function(l) { syms.push(l.textContent); });
  var complaint = document.getElementById('chiefComplaint').value;
  
  document.getElementById('results').innerHTML = '<div style="text-align:center;padding:20px;color:#8b6914">辨证中...</div>';
  
  // 收集表单数据
  var formData = {};
  formData.zongL = val('zx_zongL'); formData.zongR = val('zx_zongR');
  formData.zongLF = val('zx_zongLF'); formData.zongRF = val('zx_zongRF');
  formData.cj_step1 = val('cj_step1'); formData.cj_step2m = val('cj_step2m'); formData.cj_step2q = val('cj_step2q');
  ['左寸','左关','左尺','右寸','右关','右尺'].forEach(function(p) {
    formData['cj_t_'+p] = val('cj_t_'+p);
    formData['cj_d_'+p] = val('cj_d_'+p);
    formData['cj_q_'+p] = val('cj_q_'+p);
  });
  formData.ym_wei = val('ym_wei'); formData.ym_ti = val('ym_ti'); formData.ym_li = val('ym_li');
  formData.ym_lv = val('ym_lv'); formData.ym_lu = val('ym_lu'); formData.ym_xing = val('ym_xing'); formData.ym_lr = val('ym_lr');
  formData.zj_pulse = val('zj_pulse'); formData.zj_force = val('zj_force'); formData.zj_lr = val('zj_lr');
  formData.hy_guan = val('hy_guan'); formData.hy_guanF = val('hy_guanF'); formData.hy_left = val('hy_left'); formData.hy_right = val('hy_right');
  formData.zn_lchi = val('zn_lchi'); formData.zn_rchi = val('zn_rchi'); formData.zn_lchiF = val('zn_lchiF'); formData.zn_rchiF = val('zn_rchiF');
  formData.zn_hot = val('zn_hot'); formData.zn_stool = val('zn_stool'); formData.zn_thirst = val('zn_thirst');
  formData.cy_left = val('cy_left'); formData.cy_right = val('cy_right'); formData.cy_sweat = val('cy_sweat');
  // 胡希恕 左右总按
  formData.hx_Lfc = val('hx_Lfc'); formData.hx_Lcs = val('hx_Lcs'); formData.hx_Lld = val('hx_Lld');
  formData.hx_Rfc = val('hx_Rfc'); formData.hx_Rcs = val('hx_Rcs'); formData.hx_Rld = val('hx_Rld');
  // 胡希恕 六部分部
  ['Lcun','Lguan','Lchi','Rcun','Rguan','Rchi'].forEach(function(p){
    formData['hx_'+p+'_fc'] = val('hx_'+p+'_fc');
    formData['hx_'+p+'_mx'] = val('hx_'+p+'_mx');
    formData['hx_'+p+'_ld'] = val('hx_'+p+'_ld');
  });
  
  // 需要数据的学校列表
  var needsData = ['zhangxichun', 'chenjianguo', 'huxishu'];
  var datasNeeded = [];
  for (var i = 0; i < selIds.length; i++) {
    if (needsData.indexOf(selIds[i]) >= 0) datasNeeded.push(selIds[i]);
  }
  
  // 并行加载数据
  var promises = datasNeeded.map(function(id) { return loadData(id); });
  
  Promise.all(promises).then(function() {
    var html = '';
    for (var i = 0; i < selIds.length; i++) {
      var sid = selIds[i];
      var s = schools.find(function(x) { return x.id === sid; });
      var diag = diagnose(sid, formData, syms, complaint);
      
      html += '<div class="result-box" style="display:block">';
      html += '<h4>' + s.name + ' <span class="tag">' + s.system + '</span></h4>';
      html += '<div class="output">';
      for (var j = 0; j < diag.steps.length; j++) html += diag.steps[j] + '<br>';
      if (diag.result) html += '<br><b>结论：</b>' + diag.result + '<br>';
      if (diag.warn) html += '<div class="warn">' + diag.warn + '</div>';
      if (diag.herbs && diag.herbs.length) html += '参考用药：' + diag.herbs.join('、');
      if (diag.matchedCases && diag.matchedCases.length) {
        html += '<br><br><b>匹配医案：</b>';
        for (var k = 0; k < Math.min(diag.matchedCases.length, 3); k++) {
          var mc = diag.matchedCases[k];
          html += '<br>#' + mc.case.id + ' ' + mc.case.title;
        }
      }
      html += '</div></div>';
    }
    
    // 交叉对比
    if (selIds.length >= 2) {
      html += '<div class="result-box" style="display:block;border-left-color:#d4c4a0;background:#fefdf9;margin-top:8px">';
      html += '<h4>交叉对比 <span class="tag">多体系</span></h4>';
      html += '<div class="output" style="font-size:11px">';
      html += '<p>以上' + selIds.length + '家分别从各自辨证体系独立分析：</p>';
      html += '<p>· 张锡纯看<b>左右虚实</b>（124案脉证） · 陈建国看<b>九候脉位签名</b>（277方）</p>';
      html += '<p>· 胡希恕看<b>六经提纲症候群</b>（103方） · 曹颖甫看<b>方证脉汗对应</b>（92案）</p>';
      html += '<p>· 张仲景看<b>六经主脉定位</b> · 郑钦安看<b>尺脉真阳</b></p>';
      html += '<p>· 黄元御看<b>右关中气</b> · 姚梅龄看<b>六维分层</b> · 刘渡舟看<b>十论分诊</b></p>';
      html += '<p>若多家指向同一方向则可信度极高；若分歧则需辨析各家假设前提的差异。</p>';
      html += '</div></div>';
    }
    
    document.getElementById('results').innerHTML = html;
  }).catch(function(e) {
    document.getElementById('results').innerHTML = '<div class="result-box" style="display:block;border-left-color:#c0392b"><div class="output">数据加载异常：' + e.message + '。使用离线简化逻辑重试...</div></div>';
  });
}

function val(id) { var e = document.getElementById(id); return e ? e.value : ''; }
