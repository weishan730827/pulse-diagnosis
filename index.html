<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九家并列脉诊辨证体系 v7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f7f4ed;color:#3a2a1a;line-height:1.7}
.header{background:linear-gradient(135deg,#1a0f0a,#3d2014);color:#e8d5b0;padding:24px 20px;text-align:center}
.header h1{font-size:22px;letter-spacing:3px}
.header .sub{font-size:11px;color:#b8a080;margin-top:4px}

.container{max-width:1400px;margin:0 auto;padding:16px}

/* 步骤 */
.step{background:#fff;border-radius:10px;padding:18px 22px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.step-num{display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;background:#8b6914;color:#fff;border-radius:50%;font-size:13px;font-weight:700;margin-right:8px}
.step-title{font-size:15px;font-weight:700;color:#2c1810}
.step-desc{font-size:11px;color:#888;margin:4px 0 10px 34px}

/* 医家选择条 */
.school-bar{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px 34px}
.school-chip{padding:6px 14px;font-size:11px;border:2px solid #e5d9c5;border-radius:6px;background:#fdfbf7;cursor:pointer;transition:.2s;white-space:nowrap}
.school-chip:hover{border-color:#8b6914}
.school-chip.active{background:#8b6914;color:#fff;border-color:#8b6914;font-weight:600}
.school-chip .hint{font-size:9px;opacity:0.7;display:block;line-height:1.2}

/* 表单区域 */
.form-area{margin-left:34px;min-height:80px}
.form-placeholder{color:#aaa;font-size:12px;text-align:center;padding:30px}

/* 各家专属表单 */
.school-form{display:none;padding:14px;background:#fefdf9;border:1px solid #e8d5b7;border-radius:8px}
.school-form.active{display:block}
.school-form h3{font-size:13px;color:#8b6914;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e8d5b7}
.school-form .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.school-form .form-cell{flex:1;min-width:130px}
.school-form .form-cell label{font-size:10px;color:#777;display:block;margin-bottom:2px}
.school-form .form-cell select,.school-form .form-cell input{width:100%;padding:6px 8px;font-size:11px;border:1px solid #ddd;border-radius:4px;background:#fff}
.school-form .form-cell select:focus{border-color:#8b6914;outline:none}
.school-form .note{font-size:10px;color:#999;margin-top:6px;font-style:italic}
.zong-an{display:flex;gap:10px;margin-bottom:8px}
.zong-an>div{flex:1;padding:8px 10px;border:2px solid #d4c4a0;border-radius:6px;background:#fffef8}

/* 陈建国 四步引导 */
.cj-step{margin:8px 0 4px 34px;padding:10px 14px;background:#fdfaf4;border:1px solid #e8d5b7;border-radius:6px}
.cj-step-title{font-size:12px;font-weight:700;color:#8b6914;margin-bottom:6px}
.cj-step-desc{font-size:10px;color:#888;margin-bottom:6px;font-style:italic}
.cj-guide{font-size:11px;color:#8b6914;background:#fef9ee;padding:5px 8px;border-radius:4px;margin:4px 0;line-height:1.6}
.cj-result-box{margin:8px 0 0 34px;padding:10px;background:#fefdf9;border-left:4px solid #8b6914;border-radius:4px}
.cj-big-btn{padding:8px 18px;font-size:13px;font-weight:600;border:none;border-radius:6px;cursor:pointer;background:#8b6914;color:#fff}
.cj-big-btn:hover{background:#6b4f10}
.cj-reset{background:transparent;color:#8b6914;border:1px solid #8b6914;padding:4px 12px;font-size:11px;border-radius:4px;cursor:pointer;margin-left:8px}

/* 多选脉象 chip（胡希恕专用） */
.pulse-chip-group{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.pulse-chip-group label{font-size:11px;padding:2px 8px;border:1px solid #d4c9b0;border-radius:3px;cursor:pointer;background:#fdfaf4;white-space:nowrap}
.pulse-chip-group label:hover{border-color:#8b6914;background:#fdf3d5}
.pulse-chip-group input[type=checkbox]{display:none}
.pulse-chip-group input[type=checkbox]:checked + span{color:#fff}
.pulse-chip-group label:has(input:checked){background:#8b6914;color:#fff;border-color:#8b6914}
.hx-total-block{flex:1;min-width:180px;padding:8px 10px;border:2px solid #d4c4a0;border-radius:6px;background:#fffef8}
.hx-step-label{font-size:10px;color:#8b6914;font-weight:700;margin:5px 0 2px}

/* 结果区 */
.result-box{margin:12px 0 0 34px;padding:14px;background:#fefdf9;border-left:4px solid #8b6914;border-radius:4px;display:none}
.result-box h4{font-size:13px;color:#2c1810;margin-bottom:4px}
.result-box .tag{font-size:9px;background:#f0e6d2;color:#8b6914;padding:2px 6px;border-radius:3px;margin-left:6px}
.result-box .output{font-size:11px;color:#555;line-height:1.8;margin-top:6px}
.result-box .output b{color:#8b6914}
.result-box .warn{color:#c0392b;font-weight:600}

.btn{display:inline-block;padding:8px 24px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.btn-primary{background:#8b6914;color:#fff}.btn-primary:hover{background:#6b4f10}
.btn-outline{background:transparent;color:#8b6914;border:1px solid #8b6914}
.btn-sm{padding:4px 12px;font-size:11px}
.toolbar{text-align:center;padding:10px;font-size:11px;color:#a09080}
.toolbar a{color:#8b6914;text-decoration:none;margin:0 8px}
.toolbar a:hover{text-decoration:underline}

/* 张锡纯三步辨证漏斗 */
.zx-step{margin:10px 0;padding:12px;border:1px solid #d4c4a0;border-radius:8px;background:#fffef8}
.zx-step-title{font-size:12px;font-weight:700;color:#8b6914;margin-bottom:6px}
.zx-step-desc{font-size:11px;color:#666;margin-bottom:6px}
.zx-guide{font-size:10px;color:#8b6914;background:#fef9ef;padding:6px 8px;border-radius:4px;margin:6px 0;line-height:1.8}
.zx-radio{display:block;margin:4px 0;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:3px;transition:all .2s}
.zx-radio input{margin-right:4px}
.zx-radio:has(input:checked){background:#8b6914;color:#fff}
.zx-chip{display:inline-block;margin:3px;padding:4px 10px;font-size:11px;border:1px solid #d4c4a0;border-radius:14px;cursor:pointer;background:#fff}
.zx-chip input{display:none}
.zx-chip:has(input:checked){background:#8b6914;color:#fff;border-color:#8b6914}
.zx-big-btn{display:inline-block;padding:8px 20px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;background:#8b6914;color:#fff}
.zx-big-btn:hover{background:#6b4f10}
.zx-result-box{margin:12px 0 0 0;padding:14px;background:#fefdf9;border-left:4px solid #8b6914;border-radius:4px;display:none}
.zx-big-select label{display:block;margin:4px 0;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:3px}
.zx-big-select input{margin-right:4px}
.zx-big-select input:checked ~ span{background:#8b6914;color:#fff;padding:2px 6px;border-radius:3px}
.zx-form-row{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
</style>
<script src="diagnosis_engine.js"></script>
</head>
<body>

<div class="header">
<h1>九家并列脉诊辨证体系</h1>
<div class="sub">选医家 → 各家用各自专属脉诊表 → 按各自体系独立辨证</div>
</div>

<div class="toolbar">
<a href="jiujia_maizhen.html">通用查询工具</a> ·
<a href="pulse-diagnosis_project_index.md">文件索引</a> ·
<a href="使用手册_v2.md">使用手册</a> ·
<a href="SYSTEM_CHAIN.md">系统链</a>
</div>

<div class="container">

<!-- 第一步：选择医家 -->
<div class="step">
<span class="step-num">1</span><span class="step-title">选择医家</span>
<p class="step-desc">每家辨证体系不同，脉诊表格也不同。选一家开始，或选多家并列对比。</p>

<div class="school-bar" id="schoolBar"></div>
<div style="margin-left:34px;margin-top:6px">
<button class="btn btn-sm btn-primary" onclick="selectReco()">推荐组合</button>
<button class="btn btn-sm btn-outline" onclick="selectAll()">全选</button>
<button class="btn btn-sm btn-outline" onclick="clearSel()">清空</button>
<span style="font-size:11px;color:#999;margin-left:8px" id="selCount">未选</span>
</div>
</div>

<!-- 第二步：填写各家专属脉诊表 -->
<div class="step">
<span class="step-num">2</span><span class="step-title">填写脉诊数据</span>
<p class="step-desc">根据选中医家的体系填写其专属脉诊表。每家关注的脉诊维度不同。</p>

<div class="form-area" id="formArea">
<div class="form-placeholder">请先在第一步选择至少一家医体。</div>
</div>
</div>

<!-- 第三步：主诉与症状 -->
<div class="step">
<span class="step-num">3</span><span class="step-title">主诉与症状（通用）</span>
<p class="step-desc">此处为所有选中医家共用的症状信息。部分医家（刘渡舟、郑钦安）以此为主驱动。</p>

<div style="margin-left:34px">
<textarea id="chiefComplaint" rows="2" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:12px;margin-bottom:10px" placeholder="主诉：例：胸闷气短三日，动则加剧，畏寒怕冷，大便溏泻..."></textarea>
<div class="chip-grid" id="symGrid"></div>
</div>
</div>

<!-- 第四步：辨证执行 -->
<div class="step">
<span class="step-num">4</span><span class="step-title">辨证执行</span>
<p class="step-desc">各家按自身体系独立辨证，输出格式互不相同。</p>

<div style="margin-left:34px">
<button class="btn btn-primary" onclick="runAll()">开始辨证</button>
</div>
<div id="results"></div>
</div>

</div>

function updateUI(){
  // 更新chip高亮
  for(var i=0;i<schools.length;i++){
    var chip=document.getElementById('chip_'+schools[i].id);
    chip.classList.toggle('active',!!selectedSchools[schools[i].id]);
  }
  
  var count=Object.keys(selectedSchools).length;
  document.getElementById('selCount').textContent='已选 '+count+' 家';
  
  // 显示/隐藏各家表单
  var selIds=Object.keys(selectedSchools);
  var allForms=document.querySelectorAll('.school-form');
  for(var i=0;i<allForms.length;i++) allForms[i].classList.remove('active');
  
  if(selIds.length===0){
    document.getElementById('formPlaceholder').style.display='block';
    return;
  }
  document.getElementById('formPlaceholder').style.display='none';
  
  // 显示选中医家表单
  for(var i=0;i<selIds.length;i++){
    var s=schools.find(function(x){return x.id===selIds[i];});
    if(s){
      var f=document.getElementById(s.formId);
      if(f) f.classList.add('active');
    }
  }
}

      for (var j = 0; j < diag.steps.length; j++) html += diag.steps[j] + '<br>';
      if (diag.result) html += '<br><b>结论：</b>' + diag.result + '<br>';
      if (diag.warn) html += '<div class="warn">' + diag.warn + '</div>';
      if (diag.herbs && diag.herbs.length) html += '参考用药：' + diag.herbs.join('、');
      if (diag.matchedCases && diag.matchedCases.length) {
        html += '<br><br><b>匹配医案：</b>';
        for (var k = 0; k < Math.min(diag.matchedCases.length, 3); k++) {
          var mc = diag.matchedCases[k];
          html += '<br>#' + mc.case.id + ' ' + mc.case.title;
        }
      }
      html += '</div></div>';
    }
    
    // 交叉对比
    if (selIds.length >= 2) {
      html += '<div class="result-box" style="display:block;border-left-color:#d4c4a0;background:#fefdf9;margin-top:8px">';
      html += '<h4>交叉对比 <span class="tag">多体系</span></h4>';
      html += '<div class="output" style="font-size:11px">';
      html += '<p>以上' + selIds.length + '家分别从各自辨证体系独立分析：</p>';
      html += '<p>· 张锡纯看<b>左右虚实</b>（124案脉证） · 陈建国看<b>九候脉位签名</b>（277方）</p>';
      html += '<p>· 胡希恕看<b>六经提纲症候群</b>（103方） · 曹颖甫看<b>方证脉汗对应</b>（92案）</p>';
      html += '<p>· 张仲景看<b>六经主脉定位</b> · 郑钦安看<b>尺脉真阳</b></p>';
      html += '<p>· 黄元御看<b>右关中气</b> · 姚梅龄看<b>六维分层</b> · 刘渡舟看<b>十论分诊</b></p>';
      html += '<p>若多家指向同一方向则可信度极高；若分歧则需辨析各家假设前提的差异。</p>';
      html += '</div></div>';
    }
    
    document.getElementById('results').innerHTML = html;
  }).catch(function(e) {
    document.getElementById('results').innerHTML = '<div class="result-box" style="display:block;border-left-color:#c0392b"><div class="output">数据加载异常：' + e.message + '。使用离线简化逻辑重试...</div></div>';
  });
}

function val(id) { var e = document.getElementById(id); return e ? e.value : ''; }
