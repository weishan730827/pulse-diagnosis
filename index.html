<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九家并列脉诊辨证体系 v7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f7f4ed;color:#3a2a1a;line-height:1.7}
.header{background:linear-gradient(135deg,#1a0f0a,#3d2014);color:#e8d5b0;padding:24px 20px;text-align:center}
.header h1{font-size:22px;letter-spacing:3px}
.header .sub{font-size:11px;color:#b8a080;margin-top:4px}

.container{max-width:1400px;margin:0 auto;padding:16px}

/* 步骤 */
.step{background:#fff;border-radius:10px;padding:18px 22px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.step-num{display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;background:#8b6914;color:#fff;border-radius:50%;font-size:13px;font-weight:700;margin-right:8px}
.step-title{font-size:15px;font-weight:700;color:#2c1810}
.step-desc{font-size:11px;color:#888;margin:4px 0 10px 34px}

/* 医家选择条 */
.school-bar{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px 34px}
.school-chip{padding:6px 14px;font-size:11px;border:2px solid #e5d9c5;border-radius:6px;background:#fdfbf7;cursor:pointer;transition:.2s;white-space:nowrap}
.school-chip:hover{border-color:#8b6914}
.school-chip.active{background:#8b6914;color:#fff;border-color:#8b6914;font-weight:600}
.school-chip .hint{font-size:9px;opacity:0.7;display:block;line-height:1.2}

/* 表单区域 */
.form-area{margin-left:34px;min-height:80px}
.form-placeholder{color:#aaa;font-size:12px;text-align:center;padding:30px}

/* 各家专属表单 */
.school-form{display:none;padding:14px;background:#fefdf9;border:1px solid #e8d5b7;border-radius:8px}
.school-form.active{display:block}
.school-form h3{font-size:13px;color:#8b6914;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e8d5b7}
.school-form .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.school-form .form-cell{flex:1;min-width:130px}
.school-form .form-cell label{font-size:10px;color:#777;display:block;margin-bottom:2px}
.school-form .form-cell select,.school-form .form-cell input{width:100%;padding:6px 8px;font-size:11px;border:1px solid #ddd;border-radius:4px;background:#fff}
.school-form .form-cell select:focus{border-color:#8b6914;outline:none}
.school-form .note{font-size:10px;color:#999;margin-top:6px;font-style:italic}
.zong-an{display:flex;gap:10px;margin-bottom:8px}
.zong-an>div{flex:1;padding:8px 10px;border:2px solid #d4c4a0;border-radius:6px;background:#fffef8}

/* 陈建国 四步引导 */
.cj-step{margin:8px 0 4px 34px;padding:10px 14px;background:#fdfaf4;border:1px solid #e8d5b7;border-radius:6px}
.cj-step-title{font-size:12px;font-weight:700;color:#8b6914;margin-bottom:6px}
.cj-step-desc{font-size:10px;color:#888;margin-bottom:6px;font-style:italic}
.cj-guide{font-size:11px;color:#8b6914;background:#fef9ee;padding:5px 8px;border-radius:4px;margin:4px 0;line-height:1.6}
.cj-result-box{margin:8px 0 0 34px;padding:10px;background:#fefdf9;border-left:4px solid #8b6914;border-radius:4px}
.cj-big-btn{padding:8px 18px;font-size:13px;font-weight:600;border:none;border-radius:6px;cursor:pointer;background:#8b6914;color:#fff}
.cj-big-btn:hover{background:#6b4f10}
.cj-reset{background:transparent;color:#8b6914;border:1px solid #8b6914;padding:4px 12px;font-size:11px;border-radius:4px;cursor:pointer;margin-left:8px}

/* 多选脉象 chip（胡希恕专用） */
.pulse-chip-group{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.pulse-chip-group label{font-size:11px;padding:2px 8px;border:1px solid #d4c9b0;border-radius:3px;cursor:pointer;background:#fdfaf4;white-space:nowrap}
.pulse-chip-group label:hover{border-color:#8b6914;background:#fdf3d5}
.pulse-chip-group input[type=checkbox]{display:none}
.pulse-chip-group input[type=checkbox]:checked + span{color:#fff}
.pulse-chip-group label:has(input:checked){background:#8b6914;color:#fff;border-color:#8b6914}
.hx-total-block{flex:1;min-width:180px;padding:8px 10px;border:2px solid #d4c4a0;border-radius:6px;background:#fffef8}
.hx-step-label{font-size:10px;color:#8b6914;font-weight:700;margin:5px 0 2px}

/* 结果区 */
.result-box{margin:12px 0 0 34px;padding:14px;background:#fefdf9;border-left:4px solid #8b6914;border-radius:4px;display:none}
.result-box h4{font-size:13px;color:#2c1810;margin-bottom:4px}
.result-box .tag{font-size:9px;background:#f0e6d2;color:#8b6914;padding:2px 6px;border-radius:3px;margin-left:6px}
.result-box .output{font-size:11px;color:#555;line-height:1.8;margin-top:6px}
.result-box .output b{color:#8b6914}
.result-box .warn{color:#c0392b;font-weight:600}

.btn{display:inline-block;padding:8px 24px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.btn-primary{background:#8b6914;color:#fff}.btn-primary:hover{background:#6b4f10}
.btn-outline{background:transparent;color:#8b6914;border:1px solid #8b6914}
.btn-sm{padding:4px 12px;font-size:11px}
.toolbar{text-align:center;padding:10px;font-size:11px;color:#a09080}
.toolbar a{color:#8b6914;text-decoration:none;margin:0 8px}
.toolbar a:hover{text-decoration:underline}

/* 张锡纯三步辨证漏斗 */
.zx-step{margin:10px 0;padding:12px;border:1px solid #d4c4a0;border-radius:8px;background:#fffef8}
.zx-step-title{font-size:12px;font-weight:700;color:#8b6914;margin-bottom:6px}
.zx-step-desc{font-size:11px;color:#666;margin-bottom:6px}
.zx-guide{font-size:10px;color:#8b6914;background:#fef9ef;padding:6px 8px;border-radius:4px;margin:6px 0;line-height:1.8}
.zx-radio{display:block;margin:4px 0;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:3px;transition:all .2s}
.zx-radio input{margin-right:4px}
.zx-radio:has(input:checked){background:#8b6914;color:#fff}
.zx-chip{display:inline-block;margin:3px;padding:4px 10px;font-size:11px;border:1px solid #d4c4a0;border-radius:14px;cursor:pointer;background:#fff}
.zx-chip input{display:none}
.zx-chip:has(input:checked){background:#8b6914;color:#fff;border-color:#8b6914}
.zx-big-btn{display:inline-block;padding:8px 20px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;background:#8b6914;color:#fff}
.zx-big-btn:hover{background:#6b4f10}
.zx-result-box{margin:12px 0 0 0;padding:14px;background:#fefdf9;border-left:4px solid #8b6914;border-radius:4px;display:none}
.zx-big-select label{display:block;margin:4px 0;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:3px}
.zx-big-select input{margin-right:4px}
.zx-big-select input:checked ~ span{background:#8b6914;color:#fff;padding:2px 6px;border-radius:3px}
.zx-form-row{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}

/* ZXC 脉诊表单 */
.zong-an-card{flex:1;background:#fefdf9;border:2px solid #e8d5b7;border-radius:6px;padding:10px 12px}
.zong-an-card .title{font-size:12px;font-weight:700;color:#8b6914;margin-bottom:6px}
.zong-an-card select{width:100%;padding:5px;font-size:11px;border:1px solid #ddd;border-radius:3px;margin-bottom:3px}
.zong-an-card label{font-size:10px;color:#888;display:block;margin-top:3px}
.zong-an-row{display:flex;gap:12px;margin-bottom:10px}
.pulse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.pulse-cell{border:1px solid #e8d5b7;border-radius:4px;padding:7px;background:#fdfbf7}
.pulse-cell .pos{font-size:11px;font-weight:700;color:#8b6914;margin-bottom:3px}
.pulse-cell select{width:100%;padding:4px 5px;font-size:11px;border:1px solid #ddd;border-radius:3px;background:#fafaf7;margin-bottom:2px}
.pulse-cell select:focus{border-color:#8b6914;outline:none}
.sym-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.sym-grid label{font-size:11px;display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 5px;border-radius:3px}
.sym-grid label:hover{background:#fdf6e3}
.form-panel{background:#fff;border-radius:8px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px}
.form-panel h3{font-size:14px;color:#2c1810;margin-bottom:12px;border-bottom:2px solid #e8d5b7;padding-bottom:6px}
.section-title{font-size:12px;font-weight:700;color:#555;margin:10px 0 6px}
.btn-row{text-align:center;margin:14px 0 0}
.btn{display:inline-block;padding:8px 20px;background:#8b6914;color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer}
.btn:hover{background:#6b4f0f}
.btn-clear{background:#ccc;color:#333;margin-left:8px}
.btn-clear:hover{background:#aaa}
</style>
<script src="diagnosis_engine.js"></script>
</head>
<body>

<div class="header">
<h1>九家并列脉诊辨证体系</h1>
<div class="sub">选医家 → 各家用各自专属脉诊表 → 按各自体系独立辨证</div>
</div>

<div class="toolbar">
<a href="jiujia_maizhen.html">通用查询工具</a> ·
<a href="pulse-diagnosis_project_index.md">文件索引</a> ·
<a href="使用手册_v2.md">使用手册</a> ·
<a href="SYSTEM_CHAIN.md">系统链</a>
</div>

<div class="container">

<!-- 第一步：选择医家 -->
<div class="step">
<span class="step-num">1</span><span class="step-title">选择医家</span>
<p class="step-desc">每家辨证体系不同，脉诊表格也不同。选一家开始，或选多家并列对比。</p>

<div class="school-bar" id="schoolBar"></div>
<div style="margin-left:34px;margin-top:6px">
<button class="btn btn-sm btn-primary" onclick="selectReco()">推荐组合</button>
<button class="btn btn-sm btn-outline" onclick="selectAll()">全选</button>
<button class="btn btn-sm btn-outline" onclick="clearSel()">清空</button>
<span style="font-size:11px;color:#999;margin-left:8px" id="selCount">未选</span>
</div>
</div>

<!-- 第二步：填写各家专属脉诊表 -->
<div class="step">
<span class="step-num">2</span><span class="step-title">填写脉诊数据</span>
<p class="step-desc">根据选中医家的体系填写其专属脉诊表。每家关注的脉诊维度不同。</p>

<div class="form-area" id="formArea">
<div class="form-placeholder">请先在第一步选择至少一家医体。</div>
</div>
</div>

<!-- 第三步：主诉与症状 -->
<div class="step">
<span class="step-num">3</span><span class="step-title">主诉与症状（通用）</span>
<p class="step-desc">此处为所有选中医家共用的症状信息。部分医家（刘渡舟、郑钦安）以此为主驱动。</p>

<div style="margin-left:34px">
<textarea id="chiefComplaint" rows="2" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:12px;margin-bottom:10px" placeholder="主诉：例：胸闷气短三日，动则加剧，畏寒怕冷，大便溏泻..."></textarea>
<div class="chip-grid" id="symGrid"></div>
</div>
</div>

<!-- 第四步：辨证执行 -->
<div class="step">
<span class="step-num">4</span><span class="step-title">辨证执行</span>
<p class="step-desc">各家按自身体系独立辨证，输出格式互不相同。</p>

<div style="margin-left:34px">
<button class="btn btn-primary" onclick="runAll()">开始辨证</button>
</div>
<div id="results"></div>
</div>

</div>

<script>
// ========== 九家定义 ==========
var schools = [
  {
    id:'zhangxichun', name:'张锡纯', system:'气机升降辨证', era:'清末民初',
    pulseFields:'left-right-contrast',
    description:'核心：辨左右虚实 → 定升降方向。总按定左右，单按定脏腑。弦脉/硬脉是关键。',
    formId:'zxForm'
  },
  {
    id:'zhangzhongjing', name:'张仲景', system:'六经辨证', era:'东汉',
    pulseFields:'six-meridian',
    description:'核心：六经主脉定位。太阳浮、阳明大、少阳弦、太阴缓、少阴微细、厥阴弦细。',
    formId:'zjForm'
  },
  {
    id:'huxishu', name:'胡希恕', system:'六经八纲脉证辨证', era:'近代',
    pulseFields:'three-step-bagang',
    description:'核心：脉诊三步法定乾坤——浮沉定病位、迟数定寒热、沉取有力无力定虚实。缓≠慢（缓=因汗出脉管弛缓），26脉象三分法，103方症候群+特征脉精确匹配。总按为核心诊法，六部分部为辅助参考。',
    formId:'hxForm'
  },
  {
    id:'chenjianguo', name:'陈建国', system:'三部九候脉诊', era:'当代',
    pulseFields:'three-layer-nine-position',
    description:'核心：六步定向法，浮中沉×寸关尺九候。50方脉位签名库精确匹配。纯脉诊驱动。',
    formId:'cjForm'
  },
  {
    id:'yaomeiling', name:'姚梅龄', system:'脉学分层辨证', era:'当代',
    pulseFields:'six-dimension',
    description:'核心：六维分层（位·体·力·率·律·形）。pulse_db.json检索。知医邦28脉量化直接适用。',
    formId:'ymForm'
  },
  {
    id:'liuduzhou', name:'刘渡舟', system:'十论分诊辨证', era:'当代',
    pulseFields:'symptom-driven',
    description:'核心：症状驱动（水证·气机·脾胃），脉象辅助六经定位。症状关键词为必填。',
    formId:'ldForm'
  },
  {
    id:'huangyuanyu', name:'黄元御', system:'一气周流辨证', era:'清代',
    pulseFields:'zhongqi-guan',
    description:'核心：右关定中气，寸关尺一气升降。24脉12对阴阳。右关为必采。',
    formId:'hyForm'
  },
  {
    id:'caoyingfu', name:'曹颖甫', system:'方证对应辨证', era:'近代',
    pulseFields:'left-right-basic',
    description:'核心：左右分诊 + 92案脉证映射。病汗药汗鉴别。脉证精准对应。',
    formId:'cyForm'
  },
  {
    id:'zhengqinan', name:'郑钦安', system:'阴阳辨证', era:'清代',
    pulseFields:'chi-yang',
    description:'核心：尺脉辨真阳 + 三问定阴阳。假热真寒鉴别。尺脉必查。',
    formId:'znForm'
  }
];

var activeSchool = null;
var selectedSchools = {};

// ========== 渲染医家选择条 ==========
var barHtml='';
for(var i=0;i<schools.length;i++){
  var s=schools[i];
  barHtml+='<div class="school-chip" id="chip_'+s.id+'" onclick="toggleSchool(\''+s.id+'\')">'+s.name+'<span class="hint">'+s.system+'</span></div>';
}
document.getElementById('schoolBar').innerHTML=barHtml;

// ========== 渲染症状网格 ==========
var allSyms=['发热','恶寒','畏寒','寒热往来','自汗','盗汗','无汗','头痛','头晕','眩晕',
  '胸闷','心悸','气短','咳嗽','痰多','恶心','呕吐','呃逆','嗳气','反酸',
  '腹胀','腹痛','便秘','便溏','腹泻','小便不利','小便频数','水肿','浮肿',
  '口苦','口干','口渴','不渴','咽干','目眩','耳鸣','失眠','嗜睡','乏力',
  '纳差','肢冷','手足厥冷','麻木','腰酸','腰冷','面色萎黄','面色晄白','潮热','烦躁',
  '胸胁苦满','心下痞','脐下悸','气上冲','身重','黄疸'];
var sh='';
for(var i=0;i<allSyms.length;i++){
  sh+='<label id="sym_'+i+'" onclick="this.classList.toggle(\'selected\')">'+allSyms[i]+'</label>';
}
document.getElementById('symGrid').innerHTML=sh;

// ========== 渲染各家专属表单 ==========
var formHtml='';

// --- 张锡纯：六部脉诊五步辨证树 ---
formHtml+='<div class="school-form" id="zxForm">';
formHtml+='<div class="form-panel">';
formHtml+='<h3>脉象输入（左右手总按 + 六部单按）</h3>';
formHtml+='<div class="zong-an-row">';
formHtml+='<div class="zong-an-card"><div class="title">左手总按（三指齐按）</div>';
formHtml+='<label>脉形</label><select id="zxZongLeftShape">';
for(var i=0;i<zxShapeOpts.length;i++) formHtml+='<option>'+zxShapeOpts[i]+'</option>';
formHtml+='</select>';
formHtml+='<label>力度</label><select id="zxZongLeftForce">';
for(var i=0;i<zxForceOpts.length;i++) formHtml+='<option>'+zxForceOpts[i]+'</option>';
formHtml+='</select></div>';
formHtml+='<div class="zong-an-card"><div class="title">右手总按（三指齐按）</div>';
formHtml+='<label>脉形</label><select id="zxZongRightShape">';
for(var i=0;i<zxShapeOpts.length;i++) formHtml+='<option>'+zxShapeOpts[i]+'</option>';
formHtml+='</select>';
formHtml+='<label>力度</label><select id="zxZongRightForce">';
for(var i=0;i<zxForceOpts.length;i++) formHtml+='<option>'+zxForceOpts[i]+'</option>';
formHtml+='</select></div>';
formHtml+='</div>';
formHtml+='<p style="font-size:10px;color:#999;margin:0 0 8px">以下六部单按（浮中沉逐指），每部至少选脉形</p>';
formHtml+='<div class="section-title">左手 · 寸关尺</div>';
formHtml+='<div class="pulse-grid" id="zxLeftPulse"></div>';
formHtml+='<div class="section-title">右手 · 寸关尺</div>';
formHtml+='<div class="pulse-grid" id="zxRightPulse"></div>';
formHtml+='<div class="section-title">兼证与体征</div>';
formHtml+='<div class="sym-grid" id="zxSymGrid"></div>';
formHtml+='<div class="section-title" style="margin-top:10px">主诉（自由填写）</div>';
formHtml+='<textarea id="zxComplaint" rows="2" style="width:100%;padding:7px;border:1px solid #ddd;border-radius:4px;font-size:12px;resize:vertical" placeholder="例：头晕三日，气从脐上冲，大便三日未行..."></textarea>';
formHtml+='<div class="btn-row">';
formHtml+='<button class="btn" onclick="analyzeZXC()">张锡纯辨证分析</button>';
formHtml+='<button class="btn btn-clear" onclick="clearZXC()">清空</button>';
formHtml+='</div>';
formHtml+='</div>'; // form-panel
formHtml+='<div id="zxResult" style="display:none;margin-top:12px;padding:12px;background:#fdfbf7;border:1px solid #e8d5b7;border-radius:6px"></div>';
formHtml+='</div>'; // school-form
// --- 张仲景：六经定位 ---
formHtml+='<div class="school-form" id="zjForm"><h3>张仲景 · 六经辨证 — 六经主脉定位</h3>';
formHtml+='<div class="form-row"><div class="form-cell"><label>总体脉象</label><select id="zj_pulse"><option value="">--</option><option>浮</option><option>沉</option><option>弦</option><option>细</option><option>微</option><option>洪</option><option>大</option><option>滑</option><option>涩</option><option>数</option><option>迟</option><option>紧</option><option>缓</option><option>弱</option></select></div>';
formHtml+='<div class="form-cell"><label>力度</label><select id="zj_force"><option value="">--</option><option>有力</option><option>无力</option></select></div>';
formHtml+='<div class="form-cell"><label>左右侧重</label><select id="zj_lr"><option value="">--</option><option>左盛</option><option>右盛</option><option>均衡</option></select></div></div>';
formHtml+='<div class="note">六经主脉定位：太阳浮、阳明大、少阳弦、太阴缓弱、少阴微细、厥阴弦细欲绝。需结合症状（寒热/汗出/二便）确定六经归属。</div></div>';

function updateUI(){
  // 更新chip高亮
  for(var i=0;i<schools.length;i++){

    chip.classList.toggle('active',!!selectedSchools[schools[i].id]);
  }
  
  var count=Object.keys(selectedSchools).length;
  document.getElementById('selCount').textContent='已选 '+count+' 家';
  
  // 显示/隐藏各家表单
  var selIds=Object.keys(selectedSchools);
  var allForms=document.querySelectorAll('.school-form');
  for(var i=0;i<allForms.length;i++) allForms[i].classList.remove('active');
  
  if(selIds.length===0){
    document.getElementById('formPlaceholder').style.display='block';
    return;
  }
  document.getElementById('formPlaceholder').style.display='none';
  
  // 显示选中医家表单
  for(var i=0;i<selIds.length;i++){
    var s=schools.find(function(x){return x.id===selIds[i];});
    if(s){
      var f=document.getElementById(s.formId);
      if(f) f.classList.add('active');
    }
  }
}

// 力度量尺：评估寸部虚陷程度（左右分离，右寸优先）
function getCunForceLevels(d){
  var forces=[d.leftCun.force,d.rightCun.force];
  var shapes=[d.leftCun.shape,d.rightCun.shape];
  var levels=[0,0];
  for(var i=0;i<2;i++){
    var f=forces[i];
    if(f==='按之即无') levels[i]=Math.max(levels[i],4);
    else if(f==='弦无力') levels[i]=Math.max(levels[i],3);
    else if(f==='无力'||f==='重按始得') levels[i]=Math.max(levels[i],2);
    var s=shapes[i];
    if(s==='微'||s==='极微弱') levels[i]=Math.max(levels[i],4);
    else if(s==='弱'||s==='微弱') levels[i]=Math.max(levels[i],3);
    else if(s==='细') levels[i]=Math.max(levels[i],2);
  }
  return {left:levels[0], right:levels[1], max:Math.max(levels[0],levels[1])};
}

// 实脉判定
function isExcess(zongShape, zongForce, cun, guan, chi){
  var shapes = [zongShape, cun.shape, guan.shape, chi.shape].filter(function(x){return x;});
  var forces = [zongForce, cun.force, guan.force, chi.force].filter(function(x){return x;});
  var excessShapes = ['洪','大','硬','革','实','滑','紧','弦'];
  var hasExcess = shapes.some(function(s){return excessShapes.indexOf(s)>=0;});
  var hasForce = forces.some(function(f){return f==='有力'||f==='弹指';});
  return hasExcess || hasForce;
}

// ===== 张锡纯五步辨证树引擎 =====

  var flowKw=['气上冲','呃逆','呕吐','头目眩晕','吸气难','肩息',
              '胃气上逆','哕气','胁下胀疼','冲气','心下有气上冲',
              '腹中有气自下上冲','饮食不下','胸中烦热','昏仆'];
  var nSink=0,nFlow=0;

  for(var i=0;i<flowKw.length;i++) if(text.indexOf(flowKw[i])>=0) nFlow++;
  
  var exhaleDiff=text.indexOf('呼气难')>=0||text.indexOf('呼气困难')>=0;
  var inhaleDiff=text.indexOf('吸气难')>=0||text.indexOf('肩息')>=0;
  var qiDir='neutral';

    steps.push('<b>第一步·辨气机：</b>检出'+nSink+'项下陷症状，无上逆 → 判定「大气下陷」→ 升陷类方池');
  }else if(nFlow>0&&nSink===0){
    qiDir='counterflow';
    steps.push('<b>第一步·辨气机：</b>检出'+nFlow+'项上逆症状，无下陷 → 判定「气机上逆」→ 镇逆类方池');
  }else if(nSink>0&&nFlow>0){
    qiDir='mixed';
    steps.push('<b>第一步·辨气机：</b>下陷'+nSink+'项+上逆'+nFlow+'项 → 「升降失调」→ 全方池评估');

    steps.push('<b>第一步·辨气机：</b>无明显气机升降偏倾 → 基于脉诊深入辨证');

  if(exhaleDiff&&!inhaleDiff) steps.push('  ⚠ 呼气困难 → 支持大气下陷（原著：大气下陷者呼气难，与气逆之喘吸气难相反）');
  else if(inhaleDiff) steps.push('  ⚠ 吸气困难/肩息 → 支持气逆之喘');
  
  // 第二步：脉诊虚实寒热

    var hasXianYing=text.indexOf('弦硬')>=0||(text.indexOf('硬')>=0&&text.indexOf('弦')<0);
    var hasWeak=text.indexOf('无力')>=0||text.indexOf('按之即无')>=0||
                text.indexOf('微弱')>=0||text.indexOf('极微弱')>=0;
    
    if(hasHong&&hasHua){
      steps.push('<b>第二步·脉诊：</b>三部总按：洪滑兼具（波涛叠涌+累累如贯珠）→ 真有力，实热实证');
    }else if(hasXianYing&&!hasHong&&!hasHua){

  var rightShapes=[d.zongRight.shape,d.rightCun.shape,d.rightGuan.shape,d.rightChi.shape].filter(function(x){return x;});

    }
    if(text.indexOf('呕吐')>=0||text.indexOf('胃气上逆')>=0||text.indexOf('呃逆')>=0||text.indexOf('哕气')>=0){
      formulas.push({name:'镇逆汤', score:8, herbs:'生赭石、清半夏、生姜、竹茹', note:'冲胃并逆'});
    }
    if(leftStr.indexOf('弦硬')>=0&&rightStr.indexOf('弦硬')>=0){
      formulas.push({name:'镇肝熄风汤', score:9, herbs:'怀牛膝、生赭石、生龙骨、生牡蛎、生龟板、生杭芍、玄参、天冬', note:'肝阳上亢+冲气上冲'});
    }
    if(text.indexOf('吐血')>=0||text.indexOf('衄血')>=0||text.indexOf('咳血')>=0||text.indexOf('吐衄')>=0){
      if(text.indexOf('洪')>=0&&text.indexOf('滑')>=0){
        formulas.push({name:'寒降汤', score:8, herbs:'生赭石、清半夏、瓜蒌仁、生杭芍、竹茹、牛蒡子、甘草', note:'吐衄+阳明实热'});
      }else{
        formulas.push({name:'温降汤', score:7, herbs:'生赭石、清半夏、干姜、生怀山药、生姜', note:'吐衄+虚寒'});
      }
    }
    if(formulas.length===0&&qiDir==='counterflow'){
      formulas.push({name:'参赭镇气汤', score:5, herbs:'野台参、生赭石、生芡实、生山药、萸肉、清半夏、茯苓', note:'冲逆基础方'});
    }
  }
  
  formulas.sort(function(a,b){return b.score-a.score;});
  
  if(formulas.length>0){
    var top3=formulas.slice(0,3);
    steps.push('<b>第五步·方证锁定：</b>'+top3.map(function(f){return f.name+'('+f.score+'分)';}).join(' > '));
    var top=top3[0];
    result='推荐方剂：<b>'+top.name+'</b><br>组成：'+top.herbs+'<br>依据：'+top.note;
    herbs=top.herbs.split('、');
  }else if(d.zongLeft.shape||d.zongRight.shape||d.leftCun.shape||d.rightCun.shape){
    steps.push('<b>第五步·方证锁定：</b>未匹配到特定方剂——症状/脉象信息不足，建议补充主诉与兼证');
    result='请填写主诉和兼证信息，以精确定方。';
  }else{
    steps.push('<b>第五步·方证锁定：</b>脉象信息不足，请至少填写左右总按或寸部脉象');
    result='请填写脉象信息。';
  }
  
  return {steps:steps, result:result, herbs:herbs, warn:warn||''};
}

// 清空ZXC表单
function clearZXC(){
  var all=document.querySelectorAll('#zxForm select');
  for(var i=0;i<all.length;i++) all[i].selectedIndex=0;
  document.getElementById('zxComplaint').value='';
  var cbs=document.querySelectorAll('#zxSymGrid input');
  for(var i=0;i<cbs.length;i++) cbs[i].checked=false;
  document.getElementById('zxResult').style.display='none';
}

// 执行ZXC辨证
function analyzeZXC(){
  var d=zxCollectPulseData();
  if(!d.zongLeft.shape&&!d.zongRight.shape&&!d.leftCun.shape&&!d.rightCun.shape){
    alert('请至少填写左手或右手总按脉形');
    return;
  }
  var ret=analyzeZhangXichun(d);
  var html='<div style="margin-bottom:8px;font-size:12px;line-height:1.8">';
  html+=ret.steps.join('<br>');
  html+='</div>';
  if(ret.warn) html+='<div style="margin-top:8px;padding:8px;background:#fff3cd;border:1px solid #ffc107;border-radius:4px;font-size:12px;color:#856404"><b>⚠ '+ret.warn+'</b></div>';
  html+='<div style="margin-top:10px;padding:8px;background:#e8f5e9;border:1px solid #81c784;border-radius:4px;font-size:13px">'+ret.result+'</div>';
  document.getElementById('zxResult').style.display='block';
  document.getElementById('zxResult').innerHTML=html;
}

// 初始化ZXC表单（在selectAll/updateUI后调用）
initZXCForm();
</script>
