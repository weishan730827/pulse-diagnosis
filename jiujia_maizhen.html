<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九家并列脉诊辨证工具 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f0eb;color:#333;line-height:1.6}
.header{background:#2c1810;color:#f0d9b5;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px}.sub{font-size:11px;color:#b8a080}
.container{max-width:1500px;margin:0 auto;padding:14px}

/* 医家选择器 */
.school-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding:10px;background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.06);align-items:center}
.school-selector .label{font-size:12px;font-weight:700;color:#555;margin-right:4px;white-space:nowrap}
.school-btn{padding:5px 12px;font-size:11px;border:1px solid #d4c4a0;border-radius:4px;background:#fdfbf7;color:#5a4840;cursor:pointer;transition:.2s;white-space:nowrap}
.school-btn:hover{background:#f0e6d2}
.school-btn.active{background:#8b6914;color:#fff;border-color:#8b6914;font-weight:600}
.school-btn.all{background:#2c1810;color:#f0d9b5;border-color:#2c1810}

.form-panel{background:#fff;border-radius:8px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px}
.form-panel h3{font-size:14px;color:#2c1810;margin-bottom:12px;border-bottom:2px solid #e8d5b7;padding-bottom:6px}
.section-title{font-size:12px;font-weight:700;color:#555;margin:10px 0 6px}

/* 总按区域 */
.zong-an-row{display:flex;gap:12px;margin-bottom:10px}
.zong-an-card{flex:1;background:#fefdf9;border:2px solid #e8d5b7;border-radius:6px;padding:10px 12px}
.zong-an-card .title{font-size:12px;font-weight:700;color:#8b6914;margin-bottom:6px}
.zong-an-card select{width:100%;padding:5px;font-size:11px;border:1px solid #ddd;border-radius:3px;margin-bottom:3px}
.zong-an-card label{font-size:10px;color:#888;display:block;margin-top:3px}

.pulse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.pulse-cell{border:1px solid #e8d5b7;border-radius:4px;padding:7px;background:#fdfbf7}
.pulse-cell .pos{font-size:11px;font-weight:700;color:#8b6914;margin-bottom:3px}
.pulse-cell select{width:100%;padding:4px 5px;font-size:11px;border:1px solid #ddd;border-radius:3px;background:#fafaf7;margin-bottom:2px}
.pulse-cell select:focus{border-color:#8b6914;outline:none}
.sym-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.sym-grid label{font-size:11px;display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 5px;border-radius:3px}
.sym-grid label:hover{background:#fdf6e3}
.btn-row{text-align:center;margin:14px 0 0}
.btn{background:#8b6914;color:#fff;border:none;padding:9px 30px;font-size:14px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#a07e1f}
.btn-clear{background:#ccc;color:#555;margin-left:8px}

/* 结果 - 按医家分组 */
.school-section{margin-bottom:16px}
.school-section .school-header{font-size:14px;font-weight:700;color:#2c1810;padding:8px 12px;background:#f0e6d2;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center}
.school-section .school-header .tag{font-size:10px;background:#8b6914;color:#fff;padding:2px 8px;border-radius:3px}
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:8px}
.card{background:#fff;border-radius:5px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);border-left:3px solid #ddd;font-size:11px}
.card .fw{font-size:9px;color:#aaa;margin-bottom:4px}
.card .step{font-size:10px;color:#555;margin:2px 0;padding-left:2px}
.card .step b{color:#8b6914}
.card .result{background:#fdf6e3;padding:5px 7px;border-radius:3px;margin-top:4px}
.card .warn{color:#c0392b;font-size:10px;margin-top:3px;font-weight:600}
.card.match{border-left-color:#8b6914;background:#fefdf9}
.card.strong{border-left-color:#2c6b14}
.no-result{text-align:center;color:#aaa;font-size:11px;padding:16px}

@media(max-width:900px){.results-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
<div><h1>九家并列脉诊辨证工具 v3</h1><span class="sub">选医家 → 填脉象（含左右手总按） → 并行出结果</span></div>
</div>

<div class="container">

<!-- 医家选择 -->
<div class="school-selector">
<span class="label">选择医家：</span>
<button class="school-btn all active" onclick="selectSchools('all')" data-school="all">九家全开</button>
<button class="school-btn" onclick="selectSchools('zhangxichun')" data-school="zhangxichun">张锡纯·气机升降</button>
<button class="school-btn" onclick="selectSchools('zhangzhongjing')" data-school="zhangzhongjing">张仲景·六经</button>
<button class="school-btn" onclick="selectSchools('huxishu')" data-school="huxishu">胡希恕·八纲六经</button>
<button class="school-btn" onclick="selectSchools('chenjianguo')" data-school="chenjianguo">陈建国·三部九候</button>
<button class="school-btn" onclick="selectSchools('liuduzhou')" data-school="liuduzhou">刘渡舟·十论分诊</button>
<button class="school-btn" onclick="selectSchools('huangyuanyu')" data-school="huangyuanyu">黄元御·一气周流</button>
<button class="school-btn" onclick="selectSchools('caoyingfu')" data-school="caoyingfu">曹颖甫·方证对应</button>
<button class="school-btn" onclick="selectSchools('zhengqinan')" data-school="zhengqinan">郑钦安·阴阳</button>
<button class="school-btn" onclick="selectSchools('yaomeiling')" data-school="yaomeiling">姚梅龄·脉学分层</button>
</div>

<div class="form-panel">
<h3>脉象输入（左右手总按 + 六部单按）</h3>

<!-- 左手总按 -->
<div class="zong-an-row">
<div class="zong-an-card">
<div class="title">左手总按（三指齐按）</div>
<label>脉形</label><select id="zongLeftShape">
<option value="">--</option>
<option>浮</option><option>沉</option><option>弦</option><option>细</option><option>弱</option>
<option>洪</option><option>滑</option><option>涩</option><option>紧</option><option>缓</option>
<option>大</option><option>硬</option><option>微</option><option>数</option><option>迟</option>
<option>革</option><option>芤</option><option>促</option><option>代</option><option>结</option>
<option>伏</option><option>濡</option><option>散</option>
</select>
<label>力度</label><select id="zongLeftForce">
<option value="">--</option>
<option>有力</option><option>无力</option><option>弦硬(假有力)</option><option>弦无力</option>
<option>按之即无</option><option>弹指</option><option>重按始得</option>
</select>
</div>

<!-- 右手总按 -->
<div class="zong-an-card">
<div class="title">右手总按（三指齐按）</div>
<label>脉形</label><select id="zongRightShape">
<option value="">--</option>
<option>浮</option><option>沉</option><option>弦</option><option>细</option><option>弱</option>
<option>洪</option><option>滑</option><option>涩</option><option>紧</option><option>缓</option>
<option>大</option><option>硬</option><option>微</option><option>数</option><option>迟</option>
<option>革</option><option>芤</option><option>促</option><option>代</option><option>结</option>
<option>伏</option><option>濡</option><option>散</option>
</select>
<label>力度</label><select id="zongRightForce">
<option value="">--</option>
<option>有力</option><option>无力</option><option>弦硬(假有力)</option><option>弦无力</option>
<option>按之即无</option><option>弹指</option><option>重按始得</option>
</select>
</div>
</div>

<p style="font-size:10px;color:#999;margin:0 0 8px">以下为六部单按（浮中沉逐指），每部至少选脉形</p>

<div class="section-title">左手 · 寸关尺</div>
<div class="pulse-grid" id="leftPulse"></div>
<div class="section-title">右手 · 寸关尺</div>
<div class="pulse-grid" id="rightPulse"></div>

<div class="section-title">兼证与体征</div>
<div class="sym-grid" id="symGrid"></div>

<div class="section-title" style="margin-top:10px">主诉（自由填写）</div>
<textarea id="chiefComplaint" rows="2" style="width:100%;padding:7px;border:1px solid #ddd;border-radius:4px;font-size:12px;resize:vertical" placeholder="例：头晕三日，气从脐上冲，大便三日未行..."></textarea>

<div class="btn-row">
<button class="btn" onclick="diagnose()">九家并行辨证</button>
<button class="btn btn-clear" onclick="clearAll()">清空</button>
</div>
</div>

<div id="results"></div>
</div>

<script>
// ========== 医家选择 ==========
var activeSchools = 'all';
function selectSchools(id){
  activeSchools = id;
  document.querySelectorAll('.school-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-school="'+id+'"]').classList.add('active');
}

// ========== 构建六部表单 ==========
var posNames = ['寸','关','尺'];
var shapeOpts = ['','浮','沉','弦','细','弱','微','洪','滑','数','迟','涩','紧','缓','大','硬','革','芤','促','代','结','伏','濡','散'];
var forceOpts = ['','有力','无力','弦硬(假有力)','弦无力','按之即无','弹指','重按始得'];

function buildPulseGrid(containerId, side){
  var h='';
  for(var i=0;i<3;i++){
    var pos = side+'_'+posNames[i];
    h+='<div class="pulse-cell"><div class="pos">'+side+'手'+posNames[i]+'</div>';
    h+='<label style="font-size:9px;color:#888">脉形</label><select id="shape_'+pos+'">';
    for(var j=0;j<shapeOpts.length;j++) h+='<option>'+shapeOpts[j]+'</option>';
    h+='</select>';
    h+='<label style="font-size:9px;color:#888">力度</label><select id="force_'+pos+'">';
    for(var j=0;j<forceOpts.length;j++) h+='<option>'+forceOpts[j]+'</option>';
    h+='</select></div>';
  }
  document.getElementById(containerId).innerHTML=h;
}
buildPulseGrid('leftPulse','左');
buildPulseGrid('rightPulse','右');

// 兼证
var symptoms = ['发热','恶寒','汗出','无汗','口渴','不渴','头痛','眩晕','胸闷','心悸','气短','咳嗽','痰多','恶心','呕吐','腹胀','腹痛','便秘','便溏','小便不利','水肿','黄疸','失眠','烦躁','乏力','纳差','口苦','咽干','肢冷','麻木'];
var symHtml='';
for(var i=0;i<symptoms.length;i++){
  symHtml+='<label><input type="checkbox" value="'+symptoms[i]+'">'+symptoms[i]+'</label>';
}
document.getElementById('symGrid').innerHTML=symHtml;

// ========== 清空 ==========
function clearAll(){
  var all=document.querySelectorAll('select');
  for(var i=0;i<all.length;i++) all[i].selectedIndex=0;
  document.getElementById('chiefComplaint').value='';
  var cbs=document.querySelectorAll('#symGrid input');
  for(var i=0;i<cbs.length;i++) cbs[i].checked=false;
  document.getElementById('results').innerHTML='';
}

// ========== 采集脉象数据 ==========
function collectPulseData(){
  var data = {
    zongLeft: { shape: document.getElementById('zongLeftShape').value, force: document.getElementById('zongLeftForce').value },
    zongRight: { shape: document.getElementById('zongRightShape').value, force: document.getElementById('zongRightForce').value },
    leftCun: getPos('左_寸'), leftGuan: getPos('左_关'), leftChi: getPos('左_尺'),
    rightCun: getPos('右_寸'), rightGuan: getPos('右_关'), rightChi: getPos('右_尺'),
    symptoms: getSymptoms(),
    complaint: document.getElementById('chiefComplaint').value.trim()
  };
  return data;
}
function getPos(key){
  return {
    shape: document.getElementById('shape_'+key).value,
    force: document.getElementById('force_'+key).value
  };
}
function getSymptoms(){
  var cbs=document.querySelectorAll('#symGrid input:checked');
  var arr=[];
  for(var i=0;i<cbs.length;i++) arr.push(cbs[i].value);
  return arr;
}

// ========== 各医家辨证逻辑 ==========
var schoolNames = {
  zhangxichun: {name:'张锡纯', system:'气机升降辨证'},
  zhangzhongjing: {name:'张仲景', system:'六经辨证'},
  huxishu: {name:'胡希恕', system:'八纲六经辨证'},
  chenjianguo: {name:'陈建国', system:'三部九候脉诊辨证'},
  liuduzhou: {name:'刘渡舟', system:'十论分诊辨证'},
  huangyuanyu: {name:'黄元御', system:'一气周流辨证'},
  caoyingfu: {name:'曹颖甫', system:'方证对应辨证'},
  zhengqinan: {name:'郑钦安', system:'阴阳辨证'},
  yaomeiling: {name:'姚梅龄', system:'脉学分层辨证'}
};

function analyzeZhangXichun(d){
  var steps=[], result='', herbs=[], warn='';
  
  // ===== 构建文本描述（基于结构化数据） =====
  var allText=[];
  if(d.zongLeft.shape){
    var lz='左手总按：'+d.zongLeft.shape;
    if(d.zongLeft.force) lz+=d.zongLeft.force;
    allText.push(lz);
  }
  if(d.zongRight.shape){
    var rz='右手总按：'+d.zongRight.shape;
    if(d.zongRight.force) rz+=d.zongRight.force;
    allText.push(rz);
  }
  var posKeys=['leftCun','leftGuan','leftChi','rightCun','rightGuan','rightChi'];
  var posLabels=['左寸','左关','左尺','右寸','右关','右尺'];
  for(var i=0;i<6;i++){
    var pos=d[posKeys[i]];
    if(pos.shape){
      var line=posLabels[i]+':'+pos.shape;
      if(pos.force) line+=pos.force;
      allText.push(line);
    }
  }
  if(d.symptoms.length) allText.push('症状：'+d.symptoms.join('，'));
  if(d.complaint) allText.push('主诉：'+d.complaint);
  var text=allText.join('。');
  
  // ===== 第一步：辨气机升降 =====
  var sinkingKw=['气短','乏力','下坠感','呼气困难','努力呼吸','气息将停',
                 '短气','大气下陷','怔忡','大汗淋漓','气短不足以息',
                 '神昏','肢体痿废','二便不禁','肛门突出','声颤'];
  var flowKw=['气上冲','呃逆','呕吐','头目眩晕','吸气难','肩息',
              '胃气上逆','哕气','胁下胀疼','冲气','心下有气上冲',
              '腹中有气自下上冲','饮食不下','胸中烦热','昏仆'];
  var nSink=0,nFlow=0;
  for(var i=0;i<sinkingKw.length;i++) if(text.indexOf(sinkingKw[i])>=0) nSink++;
  for(var i=0;i<flowKw.length;i++) if(text.indexOf(flowKw[i])>=0) nFlow++;
  
  var exhaleDiff=text.indexOf('呼气难')>=0||text.indexOf('呼气困难')>=0;
  var inhaleDiff=text.indexOf('吸气难')>=0||text.indexOf('肩息')>=0;
  var qiDir='neutral';
  
  if(nSink>0&&nFlow===0){
    qiDir='sinking';
    steps.push('<b>第一步·辨气机：</b>检出'+nSink+'项下陷症状，无上逆 → 判定「大气下陷」→ 升陷类方池');
  }else if(nFlow>0&&nSink===0){
    qiDir='counterflow';
    steps.push('<b>第一步·辨气机：</b>检出'+nFlow+'项上逆症状，无下陷 → 判定「气机上逆」→ 镇逆类方池');
  }else if(nSink>0&&nFlow>0){
    qiDir='mixed';
    steps.push('<b>第一步·辨气机：</b>下陷'+nSink+'项+上逆'+nFlow+'项 → 「升降失调」→ 全方池评估');
  }else{
    steps.push('<b>第一步·辨气机：</b>无明显气机升降偏倾 → 基于脉诊深入辨证');
  }
  if(exhaleDiff&&!inhaleDiff) steps.push('  ⚠ 呼气困难 → 支持大气下陷（原著：大气下陷者呼气难，与气逆之喘吸气难相反）');
  else if(inhaleDiff) steps.push('  ⚠ 吸气困难/肩息 → 支持气逆之喘');
  
  // ===== 第二步：脉诊虚实寒热 =====
  var gemaiKw=['革','大而不洪','如按鼓革'];
  var hasGemai=false;
  for(var i=0;i<gemaiKw.length;i++) if(text.indexOf(gemaiKw[i])>=0) hasGemai=true;
  
  if(hasGemai){
    steps.push('<b>第二步·脉诊：</b>⚠ 检出革脉特征（大而不洪+有力不滑）→ 阴阳离绝之险 → 禁峻下，急收敛固脱');
    warn='革脉——阴阳离绝之险！虽见便结腹满，禁忌峻下！先收敛固脱（山萸肉、龙骨、牡蛎），攻下则真气崩解。';
  }else{
    var hasHong=text.indexOf('洪')>=0;
    var hasHua=text.indexOf('滑')>=0;
    var hasXianYing=text.indexOf('弦硬')>=0||(text.indexOf('硬')>=0&&text.indexOf('弦')<0);
    var hasWeak=text.indexOf('无力')>=0||text.indexOf('按之即无')>=0||
                text.indexOf('微弱')>=0||text.indexOf('极微弱')>=0;
    
    if(hasHong&&hasHua){
      steps.push('<b>第二步·脉诊：</b>三部总按：洪滑兼具（波涛叠涌+累累如贯珠）→ 真有力，实热实证');
    }else if(hasXianYing&&!hasHong&&!hasHua){
      steps.push('<b>第二步·脉诊：</b>弦硬但无洪滑之象 → <b>假有力</b>（阴虚阳浮）→ 滋阴潜阳，忌峻攻');
    }else if(hasWeak){
      steps.push('<b>第二步·脉诊：</b>三部总按无力 → 虚证，补益为主');
    }else{
      steps.push('<b>第二步·脉诊：</b>脉力未见明确偏颇，继续辨浮沉数迟');
    }
    if(text.indexOf('浮')>=0) steps.push('  └ 浮脉 → 表证或阴虚阳浮。关前浮+关后弱则桂枝汤证');
    if(text.indexOf('沉')>=0) steps.push('  └ 沉脉 → 里证或大气下陷（大气下陷脉多沉）');
    if((text.indexOf('数')>=0)&&hasWeak){
      steps.push('  └ 数而无力 → 虚！大补元气，忌寒凉。原著：“见数脉便用凉药，杀人无数”');
    }else if(text.indexOf('数')>=0){
      steps.push('  └ 数而有力 → 真热');
    }
    if(text.indexOf('迟')>=0) steps.push('  └ 迟而无力 → 大气下陷；迟而有力 → 寒积');
    
    // 力度量尺：寸部评估
    var cunLevel=getCunForceLevel(d);
    if(cunLevel>=3) steps.push('  └ 寸部力度量尺：level '+cunLevel+'（≥微弱）→ 达到升陷汤命中阈值');
  }
  
  // ===== 第三步：左右对比定脏腑 =====
  var leftShapes=[d.zongLeft.shape,d.leftCun.shape,d.leftGuan.shape,d.leftChi.shape].filter(function(x){return x;});
  var rightShapes=[d.zongRight.shape,d.rightCun.shape,d.rightGuan.shape,d.rightChi.shape].filter(function(x){return x;});
  var leftStr=leftShapes.join(' ')+' '+(d.zongLeft.force||'')+' '+(d.leftCun.force||'')+' '+(d.leftGuan.force||'')+' '+(d.leftChi.force||'');
  var rightStr=rightShapes.join(' ')+' '+(d.zongRight.force||'')+' '+(d.rightCun.force||'')+' '+(d.rightGuan.force||'')+' '+(d.rightChi.force||'');
  var combined=leftStr+' '+rightStr;
  
  // 弦脉九种细分匹配（原著提炼）
  var xuanMatched='';
  if(combined.indexOf('弦硬')>=0&&rightStr.indexOf('弦硬')>=0&&(rightStr.indexOf('长')>=0||d.zongRight.shape==='大')){
    xuanMatched='左右弦硬有力长 → 肝肾阴亏、肝木过盛、冲气上冲 → 镇逆+滋阴';
    if(qiDir!=='counterflow') qiDir='mixed';
  }else if(leftStr.indexOf('弦硬')>=0&&rightStr.indexOf('洪')>=0){
    xuanMatched='左弦硬+右洪实 → 肝火+阳明热 → 白虎加人参汤';

// 力度量尺：评估寸部虚陷程度
function getCunForceLevel(d){
  var forces=[d.leftCun.force,d.rightCun.force];
  var shapes=[d.leftCun.shape,d.rightCun.shape];
  var maxLevel=0;
  for(var i=0;i<2;i++){
    var f=forces[i];
    if(f==='按之即无') maxLevel=Math.max(maxLevel,4);
    else if(f==='弦无力') maxLevel=Math.max(maxLevel,3);
    else if(f==='无力'||f==='重按始得') maxLevel=Math.max(maxLevel,2);
    var s=shapes[i];
    if(s==='微'||s==='极微弱') maxLevel=Math.max(maxLevel,4);
    else if(s==='弱'||s==='微弱') maxLevel=Math.max(maxLevel,3);
    else if(s==='细') maxLevel=Math.max(maxLevel,2);
  }
  return maxLevel;
}

// ========== 辅助函数 ==========
function isExcess(zongShape, zongForce, cun, guan, chi){
  var shapes = [zongShape, cun.shape, guan.shape, chi.shape].filter(x=>x);
  var forces = [zongForce, cun.force, guan.force, chi.force].filter(x=>x);
  var excessShapes = ['洪','大','硬','革','实','滑','紧','弦'];
  var hasExcess = shapes.some(function(s){return excessShapes.indexOf(s)>=0;});
  var hasForce = forces.some(function(f){return f==='有力'||f==='弹指';});
  return hasExcess || hasForce;
}

    zhangxichun: analyzeZhangXichun, zhangzhongjing: analyzeZhangZhongjing,
    huxishu: analyzeHuXishu, chenjianguo: analyzeChenJianguo,
    liuduzhou: analyzeLiuDuzhou, huangyuanyu: analyzeHuangYuanyu,
    caoyingfu: analyzeCaoYingfu, zhengqinan: analyzeZhengQinan,
    yaomeiling: analyzeYaoMeiling
  };
  
  var html = '';
  
  for(var i=0;i<schoolList.length;i++){
    var sid = schoolList[i];
    var info = schoolNames[sid];
    var analysis = analyzers[sid](d);
    
    html += '<div class="school-section">';
    html += '<div class="school-header">'+info.name+' <span class="tag">'+info.system+'</span></div>';
    html += '<div class="results-grid">';
    html += '<div class="card match">';
    
    // 步骤
    for(var j=0;j<analysis.steps.length;j++){
      html += '<div class="step">'+analysis.steps[j]+'</div>';
    }
    
    // 结果
    if(analysis.result){
      html += '<div class="result">'+analysis.result+'</div>';
    }
    
    // 警示
    if(analysis.warn){
      html += '<div class="warn">'+analysis.warn+'</div>';
    }
    
    // 方药
    if(analysis.herbs&&analysis.herbs.length){
      html += '<div style="margin-top:4px;font-size:10px;color:#8b6914">参考用药：'+analysis.herbs.join('、')+'</div>';
    }
    
    html += '</div></div></div>';
  }
  
  // 汇总对比
  if(schoolList.length>=2){
    html += '<div class="school-section">';
    html += '<div class="school-header">九家对比汇总</div>';
    html += '<div style="padding:12px;font-size:11px;color:#555;background:#fefdf9;border-radius:0 0 6px 6px">';
    html += '<p>以上'+schoolList.length+'家分别从各自辨证体系出发给出了分析。各家关注重点不同：</p>';
    html += '<p>· 张锡纯重<b>五步决策树</b>（辨气机→脉诊虚实→左右脏腑→尺部虚里→方证锁定），弦脉九种细分，关前→寸部映射</p>';
    html += '<p>· 张仲景重<b>六经脉象定位</b></p>';
    html += '<p>· 胡希恕重<b>阴阳 → 六经 → 方证</b></p>';
    html += '<p>· 陈建国重<b>九候精准定位</b></p>';
    html += '<p>· 黄元御重<b>右关中气</b> + 一气升降</p>';
    html += '<p>· 郑钦安重<b>尺脉真阳</b> + 假热鉴别</p>';
    html += '<p>· 刘渡舟/曹颖甫/姚梅龄各有体系特点</p>';
    html += '</div></div>';
  }
  
  if(!d.zongLeft.shape&&!d.zongRight.shape&&!d.leftCun.shape&&!d.rightCun.shape){
    html = '<div class="no-result">请至少填写总按或寸口脉象后再进行辨证分析。</div>';
  }
  
  resultsDiv.innerHTML = html;
}
</script>
</body>
</html>
