const cases = [{"id": "29669", "title": "9．肺劳喘嗽兼不寐证", "left": "左部弦而无力", "right": "右部滑而无力", "rate": "", "pulse_raw": "其脉左部弦而无力，右部滑而无力，数逾五至。", "diag": "此真阴亏损，心肾不能相济，是以不眠。久则心血耗散，心火更易妄动以上铄肺金，是以咳嗽有痰作喘。治此证者，当以大滋真阴为主，真阴足则心肾自然相交，以水济火而火不妄动；真阴足则自能纳气归根，气息下达，而呼吸自顺。且肺肾为子母之脏，原相连属，子虚有", "herbs": ["生怀山药", "大枸杞", "辽沙参", "生怀地黄", "熟怀地黄", "甘草"], "formula": "降胃镇冲类"}, {"id": "29670", "title": "8．肺劳喘咳", "left": "左部弦硬", "right": "右部濡滑", "rate": "", "pulse_raw": "其脉左部弦硬，右部濡滑，两尺皆重按无根。 | 其脉左部弦硬者，肝肾之阴液不足也。", "diag": "此风邪锢闭肺中，久而伤肺，致肺中气管滞塞，暖时肌肉松缓，气管亦随之松缓，其呼吸犹可自如；冷时肌肉紧缩，气管亦随之紧缩，遂至吸难呼易而喘作，更因痰涎壅滞而嗽作矣。其脉左部弦硬者，肝肾之阴液不足也。右部濡滑者，肺胃中痰涎充溢也。两尺不任重按者，", "herbs": ["野台参", "生赭石", "生怀山药", "熟怀地黄", "生怀地黄", "大云苓片"], "formula": "降胃镇冲类"}, {"id": "29671", "title": "10．肺病咳嗽吐血", "left": "左部弦而无力", "right": "右部浮取似有力", "rate": "脉搏五至", "pulse_raw": "脉搏五至强，其左部弦而无力，右部浮取似有力，而尺部重按豁然。", "diag": "", "herbs": ["生怀山药", "大潞参", "生赭石", "生怀地黄", "大甘枸杞", "甘草"], "formula": "降胃镇冲类"}, {"id": "29672", "title": "7．肺劳痰喘", "left": "左部弦细而硬", "right": "", "rate": "", "pulse_raw": "其脉左部弦细而硬，右部濡而兼沉，至数如常。 | 此乃气血两亏，并有停饮之证，是以其左脉弦细者，气虚也。 | 其右脉濡者，湿痰留饮也。", "diag": "此乃气血两亏，并有停饮之证，是以其左脉弦细者，气虚也。弦细兼硬者，肝血虚津液短也。其右脉濡者，湿痰留饮也。濡而兼沉者，中焦气化亦有所不足也。其所以喘而且嗽者，亦痰饮上溢之所迫致也。拟用小青龙汤，再加滋补之药治之。", "herbs": ["生怀山药", "生百合", "大枸杞子", "天冬", "当归身", "苏子"], "formula": "通用清热/滋阴类"}, {"id": "29673", "title": "11．肺病咳吐脓血", "left": "左部弦长", "right": "", "rate": "", "pulse_raw": "诊其脉左部弦长，右部洪长，皆重按颇实。", "diag": "", "herbs": ["天花粉", "北沙参", "玄参", "鲜芦根", "川贝母", "牛蒡子"], "formula": "通用清热/滋阴类"}, {"id": "29674", "title": "12．肺病咳吐痰血", "left": "", "right": "", "rate": "", "pulse_raw": "其心中时常发热，大便时常燥结，幸食欲犹佳，身形不至羸弱，其脉左部近和平，右部寸 | 证脉合参，知系从前外感之热久留肺胃，金畏火刑，因热久而肺金受伤，是以咳嗽；至于胃腑久为热铄，致胃壁之膜腐烂连及血管，是以呕血；至其大便恒燥结者，因其热下输肠中，且因胃气因热上逆失其传送之职也。", "diag": "证脉合参，知系从前外感之热久留肺胃，金畏火刑，因热久而肺金受伤，是以咳嗽；至于胃腑久为热铄，致胃壁之膜腐烂连及血管，是以呕血；至其大便恒燥结者，因其热下输肠中，且因胃气因热上逆失其传送之职也。治此证者，当以清肺胃之热为主，而以养肺降胃之药辅", "herbs": ["生石膏", "粉甘草", "镜面朱砂", "生怀山药", "生赭石", "天冬"], "formula": "白虎/清热类"}, {"id": "29675", "title": "4．大气陷兼消食", "left": "", "right": "", "rate": "", "pulse_raw": "且心中常觉发热，大便干燥，小便短赤，其脉浮分无力，沉分稍实，至数略迟。 | 为其大气下陷，是以脉象浮分无力，为其有伏气化热，是以其沉分犹实，既有伏气化热矣，而脉象转稍迟者，因大气下陷之脉原多迟也。", "diag": "此乃胸中大气下陷，兼有伏气化热因之成消食也。为其大气下陷，是以脉象浮分无力，为其有伏气化热，是以其沉分犹实，既有伏气化热矣，而脉象转稍迟者，因大气下陷之脉原多迟也。盖胃中有热者，恒多化食，而大气下陷其胃气因之下降甚速者，亦恒能多食。今既病大", "herbs": ["生箭", "天花粉", "知母", "玄参", "净萸肉", "升麻"], "formula": "升陷汤类"}, {"id": "29677", "title": "1．大气下陷兼小便不禁", "left": "左右皆沉濡", "right": "右皆沉濡", "rate": "", "pulse_raw": "自觉胸中之气息息下坠，努力呼之犹难上达，其下坠之气行至少腹，小便即不能禁，且觉下焦凉甚，肢体无力，其脉左右皆沉濡，而右部寸 | 此证因大气虚陷，心血之循环无力，是以脉象沉濡而迟，肺气之呼吸将停，是以努力呼气外出而犹难上达。", "diag": "此胸中大气下陷之剧者也。此证因大气虚陷，心血之循环无力，是以脉象沉濡而迟，肺气之呼吸将停，是以努力呼气外出而犹难上达。不但此也，大气虽在膈上，实能斡旋全身统摄三焦，今因下陷而失位无权，是以全身失其斡旋，肢体遂酸软无力，三焦失其统摄，小便遂泄", "herbs": ["野台参", "附子", "生怀山药", "生箭", "生怀山药", "白术"], "formula": "升陷汤类"}, {"id": "29678", "title": "5．大气陷兼疝气", "left": "", "right": "", "rate": "", "pulse_raw": "其脉关前沉而无力，右部尤甚，至数稍迟。 | 即此证脉参之，其呼吸之短气，疝气之下坠，实皆因胸中大气下陷也。", "diag": "即此证脉参之，其呼吸之短气，疝气之下坠，实皆因胸中大气下陷也。此气一陷则肺脏之辟失其斡旋，是以呼吸短气，三焦之气化失其统摄，是以疝气下坠。斯当升补其下陷之大气，俾仍还其本位，则呼吸之短气，疝气之坠疼自皆不难愈矣。", "herbs": ["生箭", "天花粉", "净萸肉", "当归", "荔枝核", "生明没药"], "formula": "升陷汤类"}, {"id": "29679", "title": "7．胃气不降", "left": "左右皆弦", "right": "右皆弦", "rate": "", "pulse_raw": "求为延医，其脉左右皆弦，右脉弦而且长，重诊颇实，至数照常。 | 弦为肝脉，弦而且长则冲脉也。 | 弦长之脉，见于右部，尤按之颇实，此又为胃气上逆之脉。", "diag": "弦为肝脉，弦而且长则冲脉也。弦长之脉，见于右部，尤按之颇实，此又为胃气上逆之脉。肝胃冲三经之气化皆有升无降，宜其下焦便秘而上焦呕吐也。此当治以泻肝、降胃、镇冲之剂，其大便自顺，呕吐自止矣。", "herbs": ["生赭石", "生杭芍", "柏子仁", "生怀山药", "天冬", "怀牛膝"], "formula": "降胃镇冲类"}, {"id": "29680", "title": "6．冲气上冲兼奔豚", "left": "", "right": "", "rate": "", "pulse_raw": "其脉大致近和平，惟两尺稍浮，按之不实。", "diag": "此因病痢时，连服大黄下之，伤其下焦气化，而下焦之冲遂挟肾中之相火上冲也。其在丑寅之交者，阳气上升之时也。宜用仲师桂枝加桂汤加减治之。", "herbs": ["桂枝尖", "生怀山药", "生芡实", "半夏", "）生杭芍", "生龙骨"], "formula": "镇肝熄风类"}, {"id": "29681", "title": "2．大气下陷", "left": "左部弦而兼硬", "right": "", "rate": "", "pulse_raw": "其脉左部弦而兼硬，右部则寸 | 其举家数口生活皆赖一人劳力，因气陷不能劳力继将断炊，肝胆之中遂多起急火，其左脉之弦而兼硬是明征也。", "diag": "此胸中大气下陷，其肝胆又蕴有郁热也。盖胸中大气，原为后天宗气，能代先天元气主持全身，然必赖水谷之气以养之。此证因忍饥劳力过度，是以大气下陷，右寸关之沉而无力其明征也。其举家数口生活皆赖一人劳力，因气陷不能劳力继将断炊，肝胆之中遂多起急火，其", "herbs": ["生箭", "知母", "桔梗", "柴胡", "升麻", "生杭芍"], "formula": "升陷汤类"}, {"id": "29682", "title": "9．胃气不降", "left": "左部弦硬", "right": "右部弦硬而长", "rate": "", "pulse_raw": "其脉左部弦硬，右部弦硬而长，一息搏近五至，受病四年，屡次服药无效。", "diag": "此肝火与肝气相并，冲激胃腑，致胃腑之气不能息息下行传送饮食，久之，胃气不但不能下行，且更转而上逆，是以有种种诸病也。宜治以降胃理冲之品，而以滋阴清火之药辅之。", "herbs": ["生赭石", "生怀山药", "生杭芍", "玄参", "生麦芽", "茵陈"], "formula": "降胃镇冲类"}, {"id": "29683", "title": "2．咳血兼吐血证", "left": "左部浮而动", "right": "右部浮而濡", "rate": "", "pulse_raw": "自言心中摇摇似将上脱，两颧发红，面上发热，其脉左部浮而动，右部浮而濡，两尺无根，数逾五至。", "diag": "此肝肾虚极，阴分阳分不相维系，而有危在顷刻之势。遂急为出方取药以防虚脱。", "herbs": ["生怀山药", "生怀地黄", "熟怀地黄", "净萸肉", "生赭石"], "formula": "降胃镇冲类"}, {"id": "29684", "title": "1．吐血证", "left": "左部弦长", "right": "", "rate": "一息五至", "pulse_raw": "因病久身羸弱，卧床不起，亦偶有扶起少坐之时，偶或微喘，幸食欲犹佳，大便微溏，日行两三次，其脉左部弦长，重按无力，右部大而芤，一息五至。 | 再即此脉论之，其左脉之弦，右脉之大，原现有肝火浮动挟胃气上冲之象，是以其吐血时，觉有热上逆，至其脉之弦而无力者，病久而气化虚也。", "diag": "凡吐血久不愈者，多系胃气不降，致胃壁破裂，出血之处不能长肉生肌也。再即此脉论之，其左脉之弦，右脉之大，原现有肝火浮动挟胃气上冲之象，是以其吐血时，觉有热上逆，至其脉之弦而无力者，病久而气化虚也。大而兼芤者，失血过多也。至其呼吸有时或喘，大便", "herbs": ["赤石脂", "生怀山药", "净萸肉", "生龙骨", "）生牡蛎", "生杭芍"], "formula": "固脱救逆类"}, {"id": "29685", "title": "3．吐血兼咳嗽（一）", "left": "", "right": "", "rate": "", "pulse_raw": "为其肺金受伤，是以咳嗽痰中带血；为胃气不降，是以血随气升，致胃中血管破裂而大口吐血；至胁下作疼，乃肝木横恣之明证；其脉上盛下虚，气息微喘，又肾气不摄之明征也。", "diag": "此证乃肺金伤损，肝木横恣，又兼胃气不降，肾气不摄也。为其肺金受伤，是以咳嗽痰中带血；为胃气不降，是以血随气升，致胃中血管破裂而大口吐血；至胁下作疼，乃肝木横恣之明证；其脉上盛下虚，气息微喘，又肾气不摄之明征也。治之者，宜平肝、降胃、润肺、补", "herbs": ["生怀山药", "生赭石", "生怀地黄", "生杭芍", "天冬", "大甘枸杞"], "formula": "降胃镇冲类"}, {"id": "29686", "title": "5．吐血证（一）", "left": "左部弦长", "right": "", "rate": "一息五至", "pulse_raw": "其脉左部弦长，右部长而兼硬，一息五至。 | 为其肝火炽盛，是以左脉弦长；为其肝火挟冲胃之气上冲，是以右脉长而兼硬；为其失血久而真阴亏损，是以其脉既弦硬（弦硬即有阴亏之象）而又兼数也。", "diag": "此证当系肝火挟冲胃之气上冲，血亦随之上逆，又兼失血久而阴分亏也。为其肝火炽盛，是以左脉弦长；为其肝火挟冲胃之气上冲，是以右脉长而兼硬；为其失血久而真阴亏损，是以其脉既弦硬（弦硬即有阴亏之象）而又兼数也。此宜治以泻肝降胃之剂，而以大滋真阴之药", "herbs": ["生赭石", "玄参", "大生地", "生怀山药", "栝蒌仁", "生杭芍"], "formula": "降胃镇冲类"}, {"id": "29687", "title": "4．吐血兼咳嗽（二）", "left": "左部弦硬", "right": "右部弦长", "rate": "", "pulse_raw": "其脉左部弦硬，右部弦长，皆重按不实，一息搏近五至。 | 此证左脉弦硬者，阴分亏损而肝胆有热也，右部弦长者，因冲气上冲并致胃气上逆也。 | 其脉重按不实者，血亏而气亦亏也。", "diag": "此证左脉弦硬者，阴分亏损而肝胆有热也，右部弦长者，因冲气上冲并致胃气上逆也。为其冲冲胃逆，是以胃壁血管破裂以至于吐血咳血也。其脉重按不实者，血亏而气亦亏也。至于口无津液，身或灼热，大便干燥，无非血少阴亏之现象。拟治以清肝、降胃、滋阴、化瘀之", "herbs": ["生怀山药", "生怀地黄", "大甘枸杞", "生杭芍", "玄参", "生赭石"], "formula": "降胃镇冲类"}, {"id": "29688", "title": "9．大便下血（三）", "left": "左部弦而微硬", "right": "", "rate": "脉搏六至", "pulse_raw": "饮食减少，身体羸弱，面目黄白无血色，脉搏六至，左部弦而微硬，右部濡而无力。", "diag": "此证当因脾虚不能统血，是以其血下陷至其腹，所以作疼，其肠中必有损伤溃烂处也。当用药健补其脾胃，兼调养其肠中溃烂。", "herbs": ["生怀山药", "龙眼肉", "金银花", "甘草", "广三七", "鸦胆子"], "formula": "通用清热/滋阴类"}, {"id": "29689", "title": "1．脑充血头疼（一）", "left": "左右皆弦硬", "right": "右皆弦硬", "rate": "", "pulse_raw": "其脉左右皆弦硬， | 弦为肝脉，至弦硬有力无论见于何部，皆系有肝火过升之弊。 | 其夜间疼益剧者，因其脉上盛下虚，阴分原不充足，是以夜则加剧，其偶作眩晕亦职此也。", "diag": "弦为肝脉，至弦硬有力无论见于何部，皆系有肝火过升之弊。因肝火过升，恒引动冲气胃气相并上升，是以其脏腑之间恒觉有气上冲也。人之血随气行，气上升不已，血即随之上升不已，以致脑中血管充血过甚，是以作疼。其夜间疼益剧者，因其脉上盛下虚，阴分原不充足", "herbs": ["生怀山药", "生怀地黄", "玄参", "北沙参", "生杭芍", "净萸肉"], "formula": "降胃镇冲类"}, {"id": "29690", "title": "10．大便下血（四）", "left": "左部弦长", "right": "右部洪滑", "rate": "", "pulse_raw": "血随便下，且所下甚多，然不觉疼坠，心中发热懒食，其脉左部弦长，右部洪滑。", "diag": "此因劳心生内热而牵动肝经所寄相火，致肝不藏血而兼与溽暑之热相并，所以血妄行也。\n宜治以清心凉肝兼消暑热之剂，而少以培补脾胃之药佐之。", "herbs": ["生怀山药", "熟怀地黄", "净萸肉", "龙眼肉", "白头翁", "秦皮"], "formula": "固脱救逆类"}, {"id": "29691", "title": "3．脑充血头疼（三）", "left": "左右皆然，每分钟八十至，延医延医历久无效", "right": "左右皆然，每分钟八十至，延医延医历久无效", "rate": "", "pulse_raw": "其脉弦细有力而长，左右皆然，每分钟八十至，延医延医历久无效。", "diag": "此因阴分亏损，下焦气化不能固摄，冲气遂挟胃气上逆，而肝脏亦因阴分亏损水不滋木，致所寄之相火妄动，恒助肝气上冲。由斯脏腑之气化有升无降，而自心注脑之血为上升之气化所迫，遂至充塞于脑中血管而作疼作晕也。其饮食不消大便不行者，因冲胃之气皆逆也；\n", "herbs": ["生赭石", "怀牛膝", "大甘枸杞", "龙眼肉", "生怀地黄", "当归"], "formula": "降胃镇冲类"}, {"id": "29692", "title": "11．瘀血短气", "left": "", "right": "", "rate": "", "pulse_raw": "身形素强壮，自受病之后，迟延半载，渐渐羸弱，常觉右胁之下有物阻碍呼吸之气，与人言时恒半句而止，候至气上达再言，若偶忿怒则益甚，脉象近和平，惟稍弱不能条畅。 | 喜其脉虽稍弱，犹能支持，可但用化瘀血之药，徐徐化其瘀结，气息自能调顺。", "diag": "此因努力太过，致肝经有不归经之血瘀经络之间，阻塞气息升降之道路也。喜其脉虽稍弱，犹能支持，可但用化瘀血之药，徐徐化其瘀结，气息自能调顺。", "herbs": [], "formula": "通用清热/滋阴类"}, {"id": "29693", "title": "2．脑充血头疼（二）", "left": "左右皆弦硬而长", "right": "右皆弦硬而长", "rate": "", "pulse_raw": "其脉左右皆弦硬而长，重诊甚实，经中西医延医二年，毫无功效。 | 其左脉弦硬而长者，肝胆之火上升也；其右脉弦硬而长者，胃气不降而逆行，又兼冲气上冲也。 | 究之，左右脉皆弦硬，实亦阴分有亏损也。", "diag": "其左脉弦硬而长者，肝胆之火上升也；其右脉弦硬而长者，胃气不降而逆行，又兼冲气上冲也。究之，左右脉皆弦硬，实亦阴分有亏损也。因其脏腑之气化有升无降，则血随气升者过多，遂至充塞于脑部，排挤其脑中之血管而作疼，此《内经》所谓血之与气，并走于上之厥", "herbs": ["生赭石", "怀牛膝", "生怀山药", "生怀地黄", "玄参", "大甘枸杞"], "formula": "降胃镇冲类"}, {"id": "29694", "title": "6．吐血证（二）", "left": "", "right": "", "rate": "", "pulse_raw": "诊其脉弦而芤，数逾五至，其左寸摇摇有动意，问其心中觉怔忡乎？答曰∶怔忡殊甚，几若不能支持。", "diag": "此证初伤于酒，继伤于药，脏腑之血几于倾囊而出。犹幸速为立止，宜急服汤药以养其血，降其胃气保其心气，育其真阴，连服数剂，庶其血不至再吐。", "herbs": ["生怀山药", "生赭石", "玄参", "生地黄", "生龙骨", "生牡蛎"], "formula": "降胃镇冲类"}, {"id": "29695", "title": "4．脑充血兼腿痿弱", "left": "左部弦而甚硬", "right": "右部弦硬且长", "rate": "", "pulse_raw": "其脉左部弦而甚硬，右部弦硬且长。 | 其左脉弦硬者，肝气挟火上升也。 | 右脉弦硬且长者，胃气上逆更兼冲气上冲也。", "diag": "其左脉弦硬者，肝气挟火上升也。右脉弦硬且长者，胃气上逆更兼冲气上冲也。因其脏腑间之气化有升无降，是以血随气升充塞于脑部作疼作眩晕。其脑部充血过甚，或自微细血管溢血于外，或隔血管之壁，些些渗血于外，其所出之血，若着于司运动之神经，其重者可使肢", "herbs": ["生赭石", "怀牛膝", "生怀地黄", "生杭芍", "生珍珠母", "生石决明"], "formula": "降胃镇冲类"}, {"id": "29696", "title": "6．脑充血兼偏枯", "left": "左右皆弦硬", "right": "右皆弦硬", "rate": "", "pulse_raw": "诊其脉左右皆弦硬，右部似尤甚，知虽服药年余，脑充血之病犹未除也。 | 问其大便两三日一行，证脉相参，其脑中犹病充血无疑。 | 想其得病之初，脉象之弦硬，此时尤剧，是以头疼眩晕由充血之极而至于溢血，因溢血而至于残废也。", "diag": "按此证初得，不但脑充血实兼脑溢血也。其溢出之血，着于左边司运动之神经，则右半身痿废，着于右边司运动之神经，则左半身痿废，此乃交叉神经以互司其身之左右也。想其得病之初，脉象之弦硬，此时尤剧，是以头疼眩晕由充血之极而至于溢血，因溢血而至于残废也", "herbs": ["生箭", "天花粉", "生赭石", "怀牛膝", "滴乳香", "明没药"], "formula": "降胃镇冲类"}, {"id": "29697", "title": "5．脑充血兼痰厥", "left": "左右皆弦硬而长", "right": "右皆弦硬而长", "rate": "", "pulse_raw": "诊其脉左右皆弦硬而长，重按有力，知其证不但痰厥实素有脑充血病也。", "diag": "其平素头晕作疼，即脑充血之现证也。其司知觉之神经为脑充血所伤，是以精神短少。其司运动之神经为脑充血所伤，是以言语謇涩。又凡脑充血之人，其脏腑之气多上逆，胃气逆则饮食停积不能下行，肝气逆则痰火相并易于上干，此所以因饱食动怒而陡成痰厥也。此其危", "herbs": ["生赭石", "怀牛膝", "生怀地黄", "大甘枸杞", "生杭芍", "净萸肉"], "formula": "降胃镇冲类"}, {"id": "29698", "title": "2．反胃吐食", "left": "左右皆然", "right": "左右皆然", "rate": "", "pulse_raw": "身体羸弱，脉弦长，按之不实，左右皆然。", "diag": "此证之饮食不能消化，固由于脾胃虚寒，然脾胃虚寒者，食后恒易作泄泻，此则食不下行而作呕吐者，因其有冲气上冲，并迫其胃气上逆也。当以温补脾胃之药为主，而以降胃镇冲之药辅之。", "herbs": ["生怀山药", "白术", "干姜", "生鸡内金", "）生赭石", "炙甘草"], "formula": "降胃镇冲类"}, {"id": "29699", "title": "3．胃脘疼闷", "left": "左右皆弦细", "right": "右皆弦细", "rate": "", "pulse_raw": "其初病时，惟觉气分不舒，服药治疗三年，病益加剧，且身形亦渐羸弱，呼吸短气，口无津液，时常作渴，大便时常干燥，其脉左右皆弦细，右脉又兼有牢意。", "diag": "《内经》谓脾主思，此证乃过思伤脾以致脾不升胃不降也。为其脾气不上升，是以口无津液，呃逆不能上达；为其胃气不降，是以饮食停滞，大便干燥。治之者当调养其脾胃，俾还其脾升胃降之常，则中焦气化舒畅，疼胀自愈，饮食加多而诸病自除矣。", "herbs": ["生怀山药", "大甘枸杞", "生箭", "玄参", "天花粉", "生麦芽"], "formula": "通用清热/滋阴类"}, {"id": "29700", "title": "4．冷积腹疼", "left": "左右皆然，至数稍迟", "right": "左右皆然，至数稍迟", "rate": "", "pulse_raw": "脉象沉弦，左右皆然，至数稍迟。", "diag": "即其两尺沉弦凉而且坠论之，知其肠中当有冷积，此宜用温通之药下之。", "herbs": [], "formula": "通用清热/滋阴类"}, {"id": "29701", "title": "5．肠结腹疼", "left": "左右皆微弱，犹幸至数照常，按之犹有根柢，知犹可救", "right": "左右皆微弱，犹幸至数照常，按之犹有根柢，知犹可救", "rate": "", "pulse_raw": "延医服药，无论何药下咽亦皆吐出，其脉左右皆微弱，犹幸至数照常，按之犹有根柢，知犹可救。", "diag": "", "herbs": [], "formula": "降胃镇冲类"}, {"id": "29702", "title": "1．噎膈", "left": "", "right": "", "rate": "", "pulse_raw": "适其友人何××劝其求愚为之延医，其六脉细微无力，强食饼干少许，必嚼成稀糜方能下咽，咽时偶觉龃龉即作呕吐，带出痰涎若干。 | 其脉象甚弱者，为其进食甚少气血两亏也。", "diag": "杨素园谓∶“此病与失血异证同源，血之来也暴，将胃壁之膜冲开则为吐血；其来也缓，不能冲开胃膜，遂瘀于上脘之处，致食管窄隘即成噎膈。”至西人则名为胃癌，所谓癌者，如山石之有岩，其形凸出也。此与杨氏之说正相符合，其为瘀血致病无疑也。其脉象甚弱者，", "herbs": ["生赭石", "野台参", "生怀山药", "天花粉", "天冬", "桃仁"], "formula": "降胃镇冲类"}, {"id": "29703", "title": "6．肠结腹疼兼外感实热", "left": "", "right": "", "rate": "脉搏五至", "pulse_raw": "脉搏五至，左右脉象皆弱，独右 | 即此证脉论之，其阳明胃腑当蕴有外感实热，是以表里俱热，因其肠结不通，胃气不能下行，遂转而上行与热相并作呕吐。", "diag": "即此证脉论之，其阳明胃腑当蕴有外感实热，是以表里俱热，因其肠结不通，胃气不能下行，遂转而上行与热相并作呕吐。治此证之法，当用镇降之药止其呕，咸润之药开其结，又当辅以补益之品，俾其呕止、结开，而正气无伤始克有济。", "herbs": ["生石膏", "生赭石", "玄参", "潞参", "芒硝", "生麦芽"], "formula": "白虎/清热类"}, {"id": "29704", "title": "1．头疼", "left": "左部弦长", "right": "", "rate": "脉搏五至", "pulse_raw": "脉搏五至，左部弦长， | 脉犹弦而兼硬，右脉则稍和平。", "diag": "即此脉象论之，显系肝胆之热上冲脑部作疼也。宜用药清肝火、养肝阴、镇肝逆，且兼用升清降浊之药理其脑部。", "herbs": ["生杭芍", "柏子仁", "玄参", "生龟板", "）龙胆草", "川芎"], "formula": "通用清热/滋阴类"}, {"id": "29705", "title": "1．胁疼", "left": "左部微细", "right": "", "rate": "", "pulse_raw": "其脉左部微细，按之即无，右脉似近和平，其搏动之力略失于弱。", "diag": "人之肝居胁下，其性属木，原喜条达，此因肝气虚弱不能条达，故郁于胁下作疼也。其疼或在左或在右者，《\n难经\n》云，肝之为脏其治在左，其藏在右胁右肾之前并胃，着于胃之第九椎（《\n医宗金鉴\n》刺灸篇曾引此数语，今本《难经》不知被何人删去）。所谓脏者", "herbs": ["生箭", "生怀山药", "天花粉", "胡桃仁", "于白术", "生明没药"], "formula": "通用清热/滋阴类"}, {"id": "29706", "title": "3．牙疼", "left": "", "right": "右部弦长", "rate": "", "pulse_raw": "其脉左部如常，而右部弦长，按之有力。", "diag": "此阳明胃气不降也。上牙龈属足阳明胃，下牙龈属手阳明大肠。究之，胃气不降肠中之气亦必不降，火随气升，血亦因之随气上升并于牙龈而作疼，是以牙疼者牙龈之肉多肿热也。宜降其胃气兼引其上逆之血下行，更以清热之药辅之。", "herbs": ["生赭石", "怀牛膝", "滑石", "甘草"], "formula": "降胃镇冲类"}, {"id": "29707", "title": "2．目病干疼", "left": "左右皆有力，而右", "right": "左右皆有力，而右", "rate": "", "pulse_raw": "两目干涩，有时目睛胀疼，渐至视物昏花，心中时常发热，二便皆不通顺，其脉左右皆有力，而右", "diag": "凡外感之热传里，最忌但用甘寒滞泥之药，痼闭其外感之邪不能尽去，是以陆九芝谓如此治法，其病当时虽愈，后恒变成痨瘵。此证因其禀赋强壮，是以未变痨瘵而发为眼疾，医者不知清其外感之余热，而泛以治眼疾之药治之，是以历久不愈也。愚有自制离中丹，再佐以清", "herbs": ["离中丹", "鲜芦根", "鲜茅根"], "formula": "通用清热/滋阴类"}, {"id": "29708", "title": "5．腿疼", "left": "左右皆弦细无力", "right": "右皆弦细无力", "rate": "", "pulse_raw": "初疼时犹不甚剧，数延医服药无效，后因食猪头肉其疼陡然加剧，两腿不能任地，夜则疼不能寐，其脉左右皆弦细无力，两尺尤甚，至数稍迟。 | 此证因下焦相火虚衰，是以易为寒侵，而细审其脉，实更兼气虚不能充体，即不能达于四肢以运化药力，是以所服之药纵对证亦不易见效也。", "diag": "此证因下焦相火虚衰，是以易为寒侵，而细审其脉，实更兼气虚不能充体，即不能达于四肢以运化药力，是以所服之药纵对证亦不易见效也。此当助其相火祛其外寒，而更加补益气分之药，使气分壮旺自能营运药力以胜病也。", "herbs": ["野党参", "怀牛膝", "胡桃仁", "乌附子", "白术", "补骨脂"], "formula": "通用清热/滋阴类"}, {"id": "29709", "title": "1．受风水肿", "left": "左脉弦硬者", "right": "右脉滑而实者", "rate": "", "pulse_raw": "《金匮》辨水证之脉，谓风水脉浮，此证脉之部位肿甚，原无从辨其脉之浮沉，然即其自述，谓于有汗受风之后，其为风水无疑也。 | 其左脉弦硬者，肝胆有郁热也，其右脉滑而实者，外为风束胃中亦浸生热也。", "diag": "《金匮》辨水证之脉，谓风水脉浮，此证脉之部位肿甚，原无从辨其脉之浮沉，然即其自述，谓于有汗受风之后，其为风水无疑也。其左脉弦硬者，肝胆有郁热也，其右脉滑而实者，外为风束胃中亦浸生热也。至于大便干燥，小便短赤，皆肝胃有热之所致也。当用《金匮》", "herbs": ["生杭芍", "生薏米", "鲜白茅根"], "formula": "通用清热/滋阴类"}, {"id": "29710", "title": "3．胁疼", "left": "", "right": "", "rate": "", "pulse_raw": "两胁下掀疼甚剧，呻吟不止，其左胁之疼尤甚，倩人以手按之则其疼稍愈，心中时觉发热，恶心欲作呕吐，脉左右两部皆弦硬。", "diag": "此肝气胆火相助横恣，欲上升而不能透膈，郁于胁下而作疼也。当平其肝气泻其胆火，其疼自愈。", "herbs": ["川楝子", "生杭芍", "生明没药", "生麦芽", "三棱", "莪术"], "formula": "通用清热/滋阴类"}, {"id": "29711", "title": "2．阴虚水肿", "left": "左部弦细", "right": "右部弦而微硬", "rate": "", "pulse_raw": "其脉左部弦细，右部弦而微硬，其数六至。 | 且其左脉弦细，则肝之疏泄力减。 | 可致小便不利，右脉弦硬，胃之蕴热下溜，亦可使小便不利，是以积成水肿也。", "diag": "此证因阴分虚损，肾脏为虚热所伤而生炎，是以不能漉水以利小便。且其左脉弦细，则肝之疏泄力减。可致小便不利，右脉弦硬，胃之蕴热下溜，亦可使小便不利，是以积成水肿也。宜治以大滋真阴之品，俾其阴足自能退热，则肾炎可愈，胃热可清。肝木得肾水之涵濡，而", "herbs": ["熟怀地黄", "生杭芍", "生怀山药", "大甘枸杞", "柏子仁", "玄参"], "formula": "滋阴凉血类"}, {"id": "29712", "title": "案#29712", "left": "左脉弦硬而沉者", "right": "右脉弦而无力者", "rate": "", "pulse_raw": "其左脉弦硬而沉者，肝经血虚火盛而肝气又郁结也。其右脉弦而无力者，土为木伤，脾胃失其蠕动健运也。其胁疼之起点在申酉时者，因肝属木申酉属金，木遇金时其气化益遏抑不舒也。《内经》谓，“厥阴不治，求之阳明。”夫厥阴为肝，阳明为胃，遵《内经》之微旨以治此证，果能健", "diag": "其左脉弦硬而沉者，肝经血虚火盛而肝气又郁结也。其右脉弦而无力者，土为木伤，脾胃失其蠕动健运也。其胁疼之起点在申酉时者，因肝属木申酉属金，木遇金时其气化益遏抑不舒也。《内经》谓，“厥阴不治，求之阳明。”夫厥阴为肝，阳明为胃，遵《内经》之微旨以", "herbs": ["生怀山药", "大甘枸杞", "玄参", "寸麦冬", "）于白术", "生杭芍"], "formula": "通用清热/滋阴类"}, {"id": "29713", "title": "案#29713", "left": "左部沉弦", "right": "右部沉牢", "rate": "", "pulse_raw": "其脉必细数，今左部沉弦，右部沉牢，其为腰际 关 节经络有瘀而不通之气无疑，拟治以利关节通经络之剂。", "diag": "《内经》谓通则不痛，此证乃痛则不通也。肝肾果系虚弱，其脉必细数，今左部沉弦，右部沉牢，其为腰际 关 节经络有瘀而不通之气无疑，拟治以利关节通经络之剂。", "herbs": ["生怀山药", "大甘枸杞", "当归", "丹参", "生明没药", "生五灵脂"], "formula": "通用清热/滋阴类"}, {"id": "29714", "title": "案#29714", "left": "", "right": "", "rate": "", "pulse_raw": "脉象无火而微浮，拟是风水，当遵《金匮》治风水之方治之。", "diag": "", "herbs": ["生石膏", "麻黄", "甘草", "生姜", "大枣", "阿斯匹林"], "formula": "白虎/清热类"}, {"id": "29715", "title": "案#29715", "left": "", "right": "", "rate": "", "pulse_raw": "其汁于小肠以化食，遂溢于血中而成黄胆矣。治此证者，宜降胃气，除脾湿，兼清肝胆之热则黄胆自愈。", "diag": "此因脾中蕴有湿热，不能助胃消食，转输其湿热于胃，以致胃气上逆（是以呕吐），胆火亦因之上逆（黄坤载谓，非胃气下降，则胆火不降），致胆管肿胀不能输其汁于小肠以化食，遂溢于血中而成黄胆矣。治此证者，宜降胃气，除脾湿，兼清肝胆之热则黄胆自愈。", "herbs": ["生赭石", "生薏米", "茵陈", "栀子", "生麦芽", "竹茹"], "formula": "降胃镇冲类"}, {"id": "29716", "title": "案#29716", "left": "", "right": "", "rate": "", "pulse_raw": "其左右脉皆弱者，气血两虚也。而左脉之力似略胜于右脉者，知其肝胆虚而挟热，是以痢久不愈。然此热非纯系实热，不可用过凉之药，因其虚而挟热，其虚又不受补，是必所用之补品兼能泻热，俾肝胆之虚热皆愈而痢自愈矣。", "diag": "按其左右脉皆弱者，气血两虚也。而左脉之力似略胜于右脉者，知其肝胆虚而挟热，是以痢久不愈。然此热非纯系实热，不可用过凉之药，因其虚而挟热，其虚又不受补，是必所用之补品兼能泻热，俾肝胆之虚热皆愈而痢自愈矣。", "herbs": [], "formula": "通用清热/滋阴类"}, {"id": "29717", "title": "案#29717", "left": "左脉细而硬者", "right": "", "rate": "", "pulse_raw": "其脉象弦细者，气血两亏也。其左脉细而硬者，肝肾之阴亏甚也。其口干心中怔忡者，皆下血过多之所致也。此宜培养其气血而以解毒化瘀生新之药佐之。", "diag": "此乃因痢久不愈，肠中脂膜腐败，由腐败而至于溃烂，是以纯下血水杂以脂膜，即西人所谓肠溃疡也。其脉象弦细者，气血两亏也。其左脉细而硬者，肝肾之阴亏甚也。其口干心中怔忡者，皆下血过多之所致也。此宜培养其气血而以解毒化瘀生新之药佐之。", "herbs": ["龙眼肉", "生怀山药", "熟地黄", "金银花", "甘草", "广三七"], "formula": "滋阴凉血类"}, {"id": "29718", "title": "案#29718", "left": "左部弦而硬", "right": "右部弦而浮", "rate": "", "pulse_raw": "其脉左部弦而硬，右部弦而浮，其搏五至，心中发热常觉恶心。", "diag": "此肝火炽盛，肝血虚损，又兼胃气挟热上逆，是以下痢甚剧，而又噤口不食也。当治以滋阴、清热、平肝、降胃之品。", "herbs": ["生杭芍", "生怀山药", "滑石", "白头翁", "秦皮", "碎竹茹"], "formula": "通用清热/滋阴类"}, {"id": "29719", "title": "案#29719", "left": "", "right": "", "rate": "", "pulse_raw": "其脾胃，是以饮食减少完谷不化；伤其肝胆，是以胆汁凝结于胆管之中，不能输肠以化食，转由胆囊渗出，随血流行于周身而发黄。此宜用《金匮》硝石矾石散以化其胆管之凝结，而以健脾胃补肝胆之药煎汤送服。", "diag": "此脾胃肝胆两伤之病也，为勤苦寒凉过度，以致伤其脾胃，是以饮食减少完谷不化；伤其肝胆，是以胆汁凝结于胆管之中，不能输肠以化食，转由胆囊渗出，随血流行于周身而发黄。此宜用《金匮》硝石矾石散以化其胆管之凝结，而以健脾胃补肝胆之药煎汤送服。", "herbs": ["生箭", "白术", "桂枝尖", "生鸡内金", "甘草"], "formula": "通用清热/滋阴类"}, {"id": "29720", "title": "案#29720", "left": "", "right": "", "rate": "", "pulse_raw": "其肝胆之热，兼顾其脾胃之虚。", "diag": "证脉合参，当系肝胆因劳心生热，脾胃因生冷有伤，冷热相搏，遂致成痢。当清其肝胆之热，兼顾其脾胃之虚。", "herbs": ["生怀山药", "生杭芍", "当归", "炒薏米", "金银花", "竹茹"], "formula": "通用清热/滋阴类"}, {"id": "29721", "title": "案#29721", "left": "左脉弦硬者", "right": "右脉浮而无力者", "rate": "", "pulse_raw": "其疏泄之力愈大，故当小便时，肝为肾行气过于疏泄，遂致肾脏失其蛰藏之用，尿出而精亦随之出矣。其左脉弦硬者，肝脉挟风之象，其右脉浮而无力者，因病久而气血虚弱也。其尿道恒发刺痒者，尤显为风袭之明征也。此宜散其肝风，固其肾气，而更", "diag": "《内经》谓肾主蛰藏，肝主疏泄，又谓风气通于肝，又谓肝行肾之气。此证因风寒内袭入肝，肝得风助，其疏泄之力愈大，故当小便时，肝为肾行气过于疏泄，遂致肾脏失其蛰藏之用，尿出而精亦随之出矣。其左脉弦硬者，肝脉挟风之象，其右脉浮而无力者，因病久而气血", "herbs": ["生箭", "净萸肉", "生怀山药", "生龙骨", "）生牡蛎", "生杭芍"], "formula": "固脱救逆类"}, {"id": "29722", "title": "案#29722", "left": "", "right": "", "rate": "", "pulse_raw": "其血液因热暗耗，阴虚不能潜阳，是以不寐，痰停心下，火畏水刑（心属火痰属水），是以惊悸。其呼吸觉短气者，上焦凝滞之痰碍气之升降也。其大便燥结者，火盛血虚，肠中津液短也。此宜治以利痰、滋阴、降胃、柔肝之剂，再以养心安神之品辅", "diag": "此因用心过度，心热耗血，更因热生痰之证也。为其血液因热暗耗，阴虚不能潜阳，是以不寐，痰停心下，火畏水刑（心属火痰属水），是以惊悸。其呼吸觉短气者，上焦凝滞之痰碍气之升降也。其大便燥结者，火盛血虚，肠中津液短也。此宜治以利痰、滋阴、降胃、柔肝", "herbs": ["生赭石", "大甘枸杞", "生怀地黄", "生怀山药", "栝蒌仁", "天冬"], "formula": "降胃镇冲类"}, {"id": "29723", "title": "案#29723", "left": "", "right": "", "rate": "", "pulse_raw": "其中有尿即通出。乃初虽稍利，继则小便仍不出，遂求为延医。其脉 息息相通，其神明自湛然长醒。生理学家谓心有四支血管通脑，此即神明往来于心脑之路也。此证之脉其 关 前之滑实太过，系有热痰上壅将其心脑相通之路杜塞，遂至神明有所隔碍，失其常性，此癫狂失心之所由来也。治之者当投以开通", "herbs": ["生赭石", "川大黄", "半夏", "芒硝"], "formula": "降胃镇冲类"}, {"id": "29729", "title": "案#29729", "left": "", "right": "", "rate": "", "pulse_raw": "其周身偶或灼热，而脉转弦细虚濡，至数且迟，此显系内有真寒外有假热之象。宜治以大剂温补脾胃之药，俾脾胃健旺自能消化饮食，不复作吐作泻，久之则中焦气化舒畅，周身血脉贯通，余病自愈。", "diag": "此证之吐而且泻及偶痿废不能行步，皆慢脾风朕兆也。况其周身偶或灼热，而脉转弦细虚濡，至数且迟，此显系内有真寒外有假热之象。宜治以大剂温补脾胃之药，俾脾胃健旺自能消化饮食，不复作吐作泻，久之则中焦气化舒畅，周身血脉贯通，余病自愈。", "herbs": ["生怀山药", "白术", "熟怀地黄", "龙眼肉", "干姜", "生鸡内金"], "formula": "滋阴凉血类"}, {"id": "29730", "title": "案#29730", "left": "左脉弦硬者", "right": "右脉弦长者", "rate": "", "pulse_raw": "其脑部，是以其神经错乱而精神言语皆失其常也。其左脉弦硬者，肝血虚而火炽盛也。右脉弦长者，冲气挟胃气上冲之现象也。方书论脉有直上直下冲脉昭昭之语，所谓直上直下者，即脉弦且长之形状也。其两尺不实者，下焦之气化不固也，因下焦有虚脱之象，是以冲气易挟胃气上冲也。此当治以降胃、敛冲、镇肝之剂，", "diag": "此乃肝火屡动，牵引冲气胃气相并上冲，更挟痰涎上冲以滞塞于喉间并冲激其脑部，是以其神经错乱而精神言语皆失其常也。其左脉弦硬者，肝血虚而火炽盛也。右脉弦长者，冲气挟胃气上冲之现象也。方书论脉有直上直下冲脉昭昭之语，所谓直上直下者，即脉弦且长之形", "herbs": ["生赭石", "灵磁石", "生怀山药", "生龙骨", "）生杭芍", "玄参"], "formula": "降胃镇冲类"}, {"id": "29731", "title": "案#29731", "left": "", "right": "", "rate": "", "pulse_raw": "其身体素弱，又在重感之余，风寒深入阻塞经络，是以脉闭。拟治以麻黄汤，再重加补气之药，补其正气以逐邪外出，当可奏效。", "diag": "盖其身体素弱，又在重感之余，风寒深入阻塞经络，是以脉闭。拟治以麻黄汤，再重加补气之药，补其正气以逐邪外出，当可奏效。", "herbs": ["麻黄", "生箭", "桂枝尖", "杏仁", "甘草"], "formula": "通用清热/滋阴类"}, {"id": "29732", "title": "案#29732", "left": "", "right": "", "rate": "", "pulse_raw": "其所司，而有非常之变动，其脑部若充血过甚者，恒至排挤脑髓神经，使失其常司也。此证既患痫风，又兼脑部充血，则治之者自当以先治其脑部充血为急务。", "diag": "按痫风之证，皆因脑髓神经失其所司，而有非常之变动，其脑部若充血过甚者，恒至排挤脑髓神经，使失其常司也。此证既患痫风，又兼脑部充血，则治之者自当以先治其脑部充血为急务。", "herbs": [], "formula": "通用清热/滋阴类"}, {"id": "29733", "title": "案#29733", "left": "", "right": "", "rate": "", "pulse_raw": "脉虚之证，其气血亏损难抗外邪，是以有种种危险之象。其舌苔黑而干者，阳明热实津液不上潮也；其两目直视不瞬者，肝火上冲而目发胀也；其两手筋惕不安者，肝热血耗而内风将 动也 ；其谵语不省人事者，固有外感之邪热过盛，昏其神明，实亦由外感之邪热上蒸，致脑膜生炎，累及脑髓神经也。拟用白", "diag": "此乃病实脉虚之证，其气血亏损难抗外邪，是以有种种危险之象。其舌苔黑而干者，阳明热实津液不上潮也；其两目直视不瞬者，肝火上冲而目发胀也；其两手筋惕不安者，肝热血耗而内风将 动也 ；其谵语不省人事者，固有外感之邪热过盛，昏其神明，实亦由外感之邪", "herbs": ["生石膏", "生怀地黄", "野台参", "天花粉", "北沙参", "知母"], "formula": "白虎/清热类"}, {"id": "29734", "title": "案#29734", "left": "", "right": "", "rate": "", "pulse_raw": "其寒战腹疼益甚，其脉六部皆微细欲无，知其已成直中少阴之伤寒也。", "diag": "按直中少阴伤寒为麻黄 附子 细辛汤证，而因在梦遗之后，腹中作疼，则寒凉之内侵者益深入也，是宜于麻黄附子细辛汤中再加温暖补益之品。", "herbs": ["麻黄", "乌附子", "细辛", "熟地黄", "生怀山药", "净萸肉"], "formula": "固脱救逆类"}, {"id": "29735", "title": "案#29735", "left": "", "right": "", "rate": "", "pulse_raw": "其素有肋下作疼之病，身形羸弱；又当汗出之时感冒风寒，则风寒之入者必深，是以脉闭身寒；又肋下素有郁气，其肝胆之火必然郁滞，因外感所束激动其素郁之火，所以心中觉热。法当以发表之药为主，而以清热理郁兼补正之药佐之。", "diag": "因其素有肋下作疼之病，身形羸弱；又当汗出之时感冒风寒，则风寒之入者必深，是以脉闭身寒；又肋下素有郁气，其肝胆之火必然郁滞，因外感所束激动其素郁之火，所以心中觉热。法当以发表之药为主，而以清热理郁兼补正之药佐之。", "herbs": ["麻黄", "玄参", "生怀山药", "野台参", "生鸡内金", "天花粉"], "formula": "通用清热/滋阴类"}, {"id": "29736", "title": "案#29736", "left": "", "right": "", "rate": "", "pulse_raw": "其实热，滋其真阴，而更辅以酸收敛肝之品，庶可救此极危之证。", "diag": "此外感之热久不退，灼耗真阴，以致肝脏虚损，木燥生风而欲上脱也。当用药清其实热，滋其真阴，而更辅以酸收敛肝之品，庶可救此极危之证。", "herbs": ["生石膏", "野台参", "生怀地黄", "净萸肉", "生怀山药", "甘草"], "formula": "白虎/清热类"}, {"id": "29737", "title": "案#29737", "left": "左右皆然，此乃阳明腑实之证", "right": "左右皆然，此乃阳明腑实之证", "rate": "", "pulse_raw": "脉极洪实，左右皆然，此乃阳明腑实之证。凡阳明腑实之脉，多偏见于右手，此脉左右皆洪实者，因其时常懊悔，心肝积有内热也，其脑中胀疼者，因心与肝胆之热挟阳明之热上攻也。当用大剂寒凉微带表散，清其阳明胃腑之热，兼以清其心肝之热。", "diag": "", "herbs": ["知母", "甘草", "粳米", "青连翘"], "formula": "白虎/清热类"}, {"id": "29738", "title": "案#29738", "left": "", "right": "", "rate": "", "pulse_raw": "其积，则外感乘虚而入亦可成结胸。审证察脉，其病属结胸无疑，然其结之非剧，本陷胸汤之义而通变治之可也。", "diag": "寒温下早成结胸，若表有外感，里有瘀积，不知表散药与消积药并用，而专事开破以消其积，则外感乘虚而入亦可成结胸。审证察脉，其病属结胸无疑，然其结之非剧，本陷胸汤之义而通变治之可也。", "herbs": [], "formula": "通用清热/滋阴类"}, {"id": "29739", "title": "案#29739", "left": "", "right": "", "rate": "", "pulse_raw": "其胃中为热药发表所伤，是以呕吐，其素日阴亏，肝肾有热，又兼外感之热内迫，致小便不利水归大肠是以泄泻，其舌苔薄而黄者，外感原不甚剧（舌苔薄，亦主胃气虚），而治以滋阴、清热、上止呕吐、下调二便之剂。", "diag": "其胃中为热药发表所伤，是以呕吐，其素日阴亏，肝肾有热，又兼外感之热内迫，致小便不利水归大肠是以泄泻，其舌苔薄而黄者，外感原不甚剧（舌苔薄，亦主胃气虚），而治以滋阴、清热、上止呕吐、下调二便之剂。", "herbs": ["生怀山药", "滑石", "生杭芍", "生怀地黄", "半夏", "碎竹茹"], "formula": "滋阴凉血类"}, {"id": "29740", "title": "案#29740", "left": "", "right": "右脉弦硬且长", "rate": "", "pulse_raw": "其阴分，是以其脉象不为洪滑有力而为弦硬有力，此乃火盛阴亏之现象也。其作呕吐者，因其右脉弦硬且长，当有冲气上冲，因致胃气不下行而上逆也。其小便不利大便滑泻者，因阴虚肾亏不能漉水，水归大肠是以下焦之气化不能固摄也。当用拙拟滋阴宣解汤以清热、", "diag": "此证因阴分素亏血不荣筋，是以腿筋抽疼。今又加以外感之壮热，传入阳明以灼耗其阴分，是以其脉象不为洪滑有力而为弦硬有力，此乃火盛阴亏之现象也。其作呕吐者，因其右脉弦硬且长，当有冲气上冲，因致胃气不下行而上逆也。其小便不利大便滑泻者，因阴虚肾亏不", "herbs": ["生怀山药", "滑石", "生杭芍", "半夏", "）碎竹茹", "净青黛"], "formula": "通用清热/滋阴类"}, {"id": "29741", "title": "案#29741", "left": "", "right": "", "rate": "", "pulse_raw": "其证脉合参，此乃上实下虚外感之热兼挟有阴虚之热也。治之者宜上开其结，下止其泻，兼清其内伤外感之热庶可奏效。", "diag": "此证因下早而成结胸，又因小便不利而致溏泻，即其证脉合参，此乃上实下虚外感之热兼挟有阴虚之热也。治之者宜上开其结，下止其泻，兼清其内伤外感之热庶可奏效。", "herbs": ["生怀山药", "生莱菔子", "滑石", "生杭芍", "甘草"], "formula": "通用清热/滋阴类"}, {"id": "29742", "title": "案#29742", "left": "", "right": "", "rate": "", "pulse_raw": "其人冬伤于寒又兼冬不藏精，其所伤之寒伏于三焦，随春阳而化热，恒因其素不藏精乘虚而窜入少阴，此等证若未至春令即化热窜入少阴，则为少阴伤寒，即伤寒少阴证二三日以上，宜用黄连阿胶汤者也。若已至春令始化热窜入少阴，当可名为少阴温病，即温病中内有实热，脉转微细者也。诚以脉生于心，必肾阴上 | 其跳动始有力。盖", "diag": "此伏气触发于外，感而成温，因肾脏虚损而窜入少阴也。《内经》谓∶“冬伤于寒，春必病温”，此言冬时所受之寒甚轻，不能实时成为伤寒，恒伏于三焦脂膜之中，阻塞气化之升降，暗生内热，至春阳萌动之时，其所生之热恒激发于春阳而成温。然此等温病未必入少阴也", "herbs": ["生石膏", "野台参", "生怀地黄", "生怀山药", "玄参", "辽沙参"], "formula": "白虎/清热类"}, {"id": "29743", "title": "案#29743", "left": "", "right": "", "rate": "", "pulse_raw": "脉相参，知其阳明腑热已实，又挟冲气上冲，所以不能进食，服药亦多呕也。欲治此证当以清胃之药为主，而以降冲之药辅之。则冲气不上冲，胃气亦必随之下降，而呕吐能止即可以受药进食矣。", "diag": "即此证脉相参，知其阳明腑热已实，又挟冲气上冲，所以不能进食，服药亦多呕也。欲治此证当以清胃之药为主，而以降冲之药辅之。则冲气不上冲，胃气亦必随之下降，而呕吐能止即可以受药进食矣。", "herbs": ["生石膏", "生赭石", "知母", "潞党参", "粳米", "甘草"], "formula": "白虎/清热类"}, {"id": "29744", "title": "案#29744", "left": "", "right": "", "rate": "", "pulse_raw": "其病在太阳，所以脉浮；为其连及阳明，所以按之有力；为其更连及少阳，是以脉浮有力而又兼弦也。其胸膈满闷呼吸不利者，因其 怒气 溢于胸中，挟风邪痰饮凝结于太阳部位也。宜外解太阳之表，内清阳明之热，兼和解其少阳，更开荡其胸膈，方为完全之策。", "diag": "此病系在太阳而连及阳明少阳也。为其病在太阳，所以脉浮；为其连及阳明，所以按之有力；为其更连及少阳，是以脉浮有力而又兼弦也。其胸膈满闷呼吸不利者，因其 怒气 溢于胸中，挟风邪痰饮凝结于太阳部位也。宜外解太阳之表，内清阳明之热，兼和解其少阳，更", "herbs": ["生石膏", "蒌仁", "生莱菔子", "天花粉", "苏子", "连翘"], "formula": "白虎/清热类"}, {"id": "29745", "title": "案#29745", "left": "", "right": "", "rate": "", "pulse_raw": "其脉仍然无力也。其烦躁异常者，亦因水火之气不相交也。此虽温病，实与少阴伤寒之热者无异，故其脉亦与少阴伤寒之脉同。当治以白虎加人参汤，将原方少为变通，而再加托表疹毒之品辅之。", "diag": "此证当先有伏气化热，因受外感之传染而激发，缘三焦脂膜窜入少阴遏抑肾气，不能上与心火相济，是以舌苔已黄，小便短赤，阳明腑热已实，而其脉仍然无力也。其烦躁异常者，亦因水火之气不相交也。此虽温病，实与少阴伤寒之热者无异，故其脉亦与少阴伤寒之脉同。", "herbs": ["生石膏", "大潞参", "天花粉", "生怀山药", "鲜茅根", "甘草"], "formula": "白虎/清热类"}, {"id": "29746", "title": "案#29746", "left": "", "right": "", "rate": "", "pulse_raw": "脉象弦而有力。其按之不实者，因从前服开降之药过多也。其腹疼甚剧者，因弦原主疼，兹则弦而且有力，致腹中气化不和故疼甚剧也。其烦躁者，因下久阴虚，肾气不能上达与心相济，遂不耐肝火温热之灼耗，故觉烦躁也。 宜治以清温凉肝之品，而以滋阴补正之药辅之。", "diag": "此病因肝火甚盛，兼有外感之热已入阳明，所以脉象弦而有力。其按之不实者，因从前服开降之药过多也。其腹疼甚剧者，因弦原主疼，兹则弦而且有力，致腹中气化不和故疼甚剧也。其烦躁者，因下久阴虚，肾气不能上达与心相济，遂不耐肝火温热之灼耗，故觉烦躁也。", "herbs": ["生杭芍", "滑石", "生怀山药", "天花粉", "山楂片", "连翘"], "formula": "通用清热/滋阴类"}, {"id": "29747", "title": "案#29747", "left": "左脉弦硬者", "right": "", "rate": "", "pulse_raw": "其热陡发。其左脉弦硬者，劳力过度肝肾之阴分有伤也。右部洪实者，阳明之腑热已实也。其洪实兼浮者，证犹连表也。拟治以白虎加人参汤以玄参代知母，生山药代粳米，更辅以透表之药以引热外出。", "diag": "此证因长途炎热劳碌，脏腑间先有积热，又为外感所袭，则其热陡发。其左脉弦硬者，劳力过度肝肾之阴分有伤也。右部洪实者，阳明之腑热已实也。其洪实兼浮者，证犹连表也。拟治以白虎加人参汤以玄参代知母，生山药代粳米，更辅以透表之药以引热外出。", "herbs": ["生石膏", "大潞参", "玄参", "生怀山药", "甘草", "阿斯匹林"], "formula": "白虎/清热类"}, {"id": "29748", "title": "案#29748", "left": "", "right": "", "rate": "", "pulse_raw": "其热循经上升兼发生脑膜炎也。脑藏神明主知觉，神经因热受伤，是以知觉全无，宜投以大剂白虎汤以清胃腑之热，而复佐以轻清之品，以引药之凉力上行，则脑中之热与胃腑之热全清，神识自明了矣。", "diag": "此温热之病，阳明腑热已实，其热循经上升兼发生脑膜炎也。脑藏神明主知觉，神经因热受伤，是以知觉全无，宜投以大剂白虎汤以清胃腑之热，而复佐以轻清之品，以引药之凉力上行，则脑中之热与胃腑之热全清，神识自明了矣。", "herbs": ["生石膏", "知母", "连翘", "茵陈", "甘草", "粳米"], "formula": "白虎/清热类"}, {"id": "29749", "title": "案#29749", "left": "", "right": "", "rate": "", "pulse_raw": "脉数逾五至，浮弦无力。自始病至此已四十日矣，屡次延医服药无效。", "diag": "此证乃薄受外感，并非难治之证。因治疗失宜，已逾月而外表未解，内热自不能清。病则懒食，又兼热久耗阴，遂由外感之实热，酿成内伤之虚热，二热相并，则愈难治矣。斯当以大滋真阴之药为主，而以解表泻热之药佐之。", "herbs": ["生怀山药", "生怀地黄", "玄参", "沙参", "生杭芍", "大甘枸杞"], "formula": "滋阴凉血类"}, {"id": "29750", "title": "案#29750", "left": "", "right": "", "rate": "", "pulse_raw": "其卧不安枕，手足扰动，脉难细诊，其大致总近热象，其舌色紫而干，舌根微有黄苔，大便两日未行。", "diag": "此乃因日日伤心，身体虚损，始则因痛悼而脏腑生热，继则因热久耗阴而更生虚热，继又因时令之燥热内侵与内蕴之热相并，激动肝火下迫腹中，是以作疼，火热炽盛，是以表里俱觉发热。此宜清其温热，平其肝火，理其腹疼，更宜防其腹疼成痢也。", "herbs": [], "formula": "通用清热/滋阴类"}, {"id": "29751", "title": "案#29751", "left": "左脉弦硬", "right": "", "rate": "", "pulse_raw": "脉洪实，其炽盛之肝火下迫肠中作痢，是以左脉弦硬。 夫阳明脉实而渴者，宜用白虎加入参汤，因其肝热甚盛，证兼下痢，又宜以生山药代粳米以固下焦气化，更辅以凉肝调气之品，则温与痢庶可并愈。", "diag": "此风温之热已入阳明之腑，是以右脉洪实，其炽盛之肝火下迫肠中作痢，是以左脉弦硬。 夫阳明脉实而渴者，宜用白虎加入参汤，因其肝热甚盛，证兼下痢，又宜以生山药代粳米以固下焦气化，更辅以凉肝调气之品，则温与痢庶可并愈。", "herbs": ["生石膏", "野党参", "生怀山药", "生杭芍", "知母", "白头翁"], "formula": "白虎/清热类"}, {"id": "29752", "title": "案#29752", "left": "", "right": "", "rate": "", "pulse_raw": "其脉左部微弱，右部重按颇实，搏近六至。", "diag": "此暑热郁于阳明之腑，是以发热懒食，而肝肾气化不舒，是以小便不利致大便泄泻也。当清泻胃腑，调补肝肾，病当自愈。", "herbs": ["生怀山药", "滑石", "生杭芍", "净萸肉", "生麦芽", "甘草"], "formula": "固脱救逆类"}, {"id": "29753", "title": "案#29753", "left": "", "right": "", "rate": "", "pulse_raw": "脉数十至且无力（四岁时，当以七至为正脉），指纹现淡红色，已透气 关 。", "diag": "此因外感之热久留耗阴，气化伤损，是以上焦发热懒食，下焦小便不利而大便泄泻也。宜治以滋阴、清热、利小便兼固大便之剂。", "herbs": ["生怀山药", "滑石", "生杭芍", "甘草"], "formula": "通用清热/滋阴类"}, {"id": "29754", "title": "案#29754", "left": "左脉弦而兼硬者", "right": "", "rate": "", "pulse_raw": "其左脉弦而兼硬者，肝血虚而胆火盛也。其右脉似有力而重按不实者，因其下痢久而气化已伤，外感之热又侵入阳明之腑也。其数六至者，缘外感之热灼耗已久，而其真阴大有亏损也。证脉合参，此乃邪实正虚之候。拟用拙定通变白虎加人参汤，及通变白头翁汤二方相并治之。", "diag": "其左脉弦而兼硬者，肝血虚而胆火盛也。其右脉似有力而重按不实者，因其下痢久而气化已伤，外感之热又侵入阳明之腑也。其数六至者，缘外感之热灼耗已久，而其真阴大有亏损也。证脉合参，此乃邪实正虚之候。拟用拙定通变白虎加人参汤，及通变白头翁汤二方相并治", "herbs": ["生石膏", "野台参", "生怀山药", "生杭芍", "白头翁", "金银花"], "formula": "白虎/清热类"}, {"id": "29755", "title": "案#29755", "left": "", "right": "", "rate": "", "pulse_raw": "脉，大抵弦细，因其气虚所以无甚起伏，因其血液短少，是以细而不濡，至于弦硬而长有力，是显有温热之现象也。此当清其实热而辅以补正兼解表之品。", "diag": "此因汗出腠理不闭，风袭风池、风府，是以项疼，因而成风温也。高年之脉，大抵弦细，因其气虚所以无甚起伏，因其血液短少，是以细而不濡，至于弦硬而长有力，是显有温热之现象也。此当清其实热而辅以补正兼解表之品。", "herbs": ["生石膏", "野台参", "生怀地黄", "生怀山药", "玄参", "沙参"], "formula": "白虎/清热类"}, {"id": "29756", "title": "案#29756", "left": "", "right": "右脉弦而有力者", "rate": "", "pulse_raw": "脉象弦者主疼，又主血液短少，此证之右胁非常疼痛，原为证脉相符，而其伤心劳心以致暗生内热者，其血液必然伤损，此亦证脉相符也。其右脉弦而有力者，外感之热已入阳明之府也。拟治以白虎汤而辅以开郁滋阴之品。", "diag": "凡脉象弦者主疼，又主血液短少，此证之右胁非常疼痛，原为证脉相符，而其伤心劳心以致暗生内热者，其血液必然伤损，此亦证脉相符也。其右脉弦而有力者，外感之热已入阳明之府也。拟治以白虎汤而辅以开郁滋阴之品。", "herbs": ["生石膏", "知母", "玄参", "天冬", "川楝子", "生莱菔子"], "formula": "白虎/清热类"}, {"id": "29757", "title": "案#29757", "left": "", "right": "", "rate": "", "pulse_raw": "其脉之洪长有力是明征也。拟投以大剂白虎汤，再少佐以宣散之品。", "diag": "此因未病之先已有伏气化热，或有暑气之热内伏，略为外感所激，即表里陡发壮热，一两日间阳明府热已实，其脉之洪长有力是明征也。拟投以大剂白虎汤，再少佐以宣散之品。", "herbs": ["知母", "鲜茅根", "青连翘", "甘草", "粳米"], "formula": "白虎/清热类"}, {"id": "29758", "title": "案#29758", "left": "", "right": "", "rate": "", "pulse_raw": "其外感之热已入阳明胃府，是以表里俱壮热，而舌苔已黄，为其激动之火积于少阳肝胆，是以其火上冲频作呕吐。治此证者欲其受药不吐，当变汤剂为散，且又分毫无药味，庶可奏效。", "diag": "此少阳阳明合病也。为其外感之热已入阳明胃府，是以表里俱壮热，而舌苔已黄，为其激动之火积于少阳肝胆，是以其火上冲频作呕吐。治此证者欲其受药不吐，当变汤剂为散，且又分毫无药味，庶可奏效。", "herbs": ["生石膏", "鲜梨"], "formula": "白虎/清热类"}, {"id": "29759", "title": "案#29759", "left": "左脉沉弦者", "right": "", "rate": "", "pulse_raw": "其左脉沉弦者，知其肝气郁滞不能条达，是以呻吟不止，此欲借呻吟以舒其气也。其右脉洪实者，知此证必有伏气化热，窜入阳明，不然则外感之温病，半日之间何至若斯之剧也。此当用白虎汤以清阳明之热，而以调气舒肝之药佐之。", "diag": "其左脉沉弦者，知其肝气郁滞不能条达，是以呻吟不止，此欲借呻吟以舒其气也。其右脉洪实者，知此证必有伏气化热，窜入阳明，不然则外感之温病，半日之间何至若斯之剧也。此当用白虎汤以清阳明之热，而以调气舒肝之药佐之。", "herbs": ["生石膏", "知母", "生莱菔子", "青连翘", "甘草", "粳米"], "formula": "白虎/清热类"}, {"id": "29760", "title": "案#29760", "left": "左部弦硬者", "right": "右部弦长者", "rate": "", "pulse_raw": "其脉左部弦硬者，肝胆之火炽盛也。右部弦长者，冲气挟胃气上冲也。弦长而兼有力者，外感之热已入阳明之府也。此证因被盗怒动肝气，肝火上冲，并激动冲气挟胃气亦上冲，而外感之热又复炽盛于胃中以相助为虐，是以烦热汗出不受饮食而吐药吐水也。此当投以清热镇逆之剂。", "diag": "其脉左部弦硬者，肝胆之火炽盛也。右部弦长者，冲气挟胃气上冲也。弦长而兼有力者，外感之热已入阳明之府也。此证因被盗怒动肝气，肝火上冲，并激动冲气挟胃气亦上冲，而外感之热又复炽盛于胃中以相助为虐，是以烦热汗出不受饮食而吐药吐水也。此当投以清热镇", "herbs": ["生石膏", "生赭石", "镜面朱砂"], "formula": "白虎/清热类"}, {"id": "29761", "title": "案#29761", "left": "", "right": "右脉皆弦长", "rate": "", "pulse_raw": "其外感之热已入阳明之府，是以右脉之力胜于左脉，为其冲气挟胃气肝火上冲，是以左右脉皆弦长。病现喘逆及咽喉肿疼，其肿痛偏左者，正当肝火上升之路也。拟治以麻杏甘石汤，兼加镇冲降胃纳气利痰之品以辅之，又宜兼用针刺放血以救目前之急。", "diag": "此乃外感之热已入阳明之府，而冲气又挟胃气肝火上冲也。为其外感之热已入阳明之府，是以右脉之力胜于左脉，为其冲气挟胃气肝火上冲，是以左右脉皆弦长。病现喘逆及咽喉肿疼，其肿痛偏左者，正当肝火上升之路也。拟治以麻杏甘石汤，兼加镇冲降胃纳气利痰之品以", "herbs": ["麻黄", "生石膏", "生赭石", "生怀山药", "杏仁", "连翘"], "formula": "白虎/清热类"}, {"id": "29762", "title": "案#29762", "left": "", "right": "", "rate": "", "pulse_raw": "脉象见滑，虽主有痰亦足征阴分充足。且视其身体胖壮，知犹可治，宜用《金匮》小青龙加石膏汤，再加杏仁、川贝以利其肺气。", "diag": "观此证状况已危至极点，然脉象见滑，虽主有痰亦足征阴分充足。且视其身体胖壮，知犹可治，宜用《金匮》小青龙加石膏汤，再加杏仁、川贝以利其肺气。", "herbs": ["麻黄", "桂枝尖", "生杭芍", "半夏", "杏仁", "川贝母"], "formula": "白虎/清热类"}, {"id": "29763", "title": "案#29763", "left": "", "right": "", "rate": "", "pulse_raw": "其大便又复溏泻，欲清其热，又恐其溏泻益甚，且在发疹，更虞其因溏泻毒内陷也。是以治此证者，当上清其热下止其泻，兼托疹毒外出，证候虽险，自能治愈。", "diag": "凡上焦有热之证，最忌下焦滑泻。此证上焦之热已极，而其大便又复溏泻，欲清其热，又恐其溏泻益甚，且在发疹，更虞其因溏泻毒内陷也。是以治此证者，当上清其热下止其泻，兼托疹毒外出，证候虽险，自能治愈。", "herbs": ["生怀山药", "滑石", "生石膏", "生杭芍", "甘草", "连翘"], "formula": "白虎/清热类"}, {"id": "29764", "title": "案#29764", "left": "", "right": "", "rate": "", "pulse_raw": "脉象犹浮，舌苔犹白，盖得病甫二日，表证犹未罢也。而右关重按有力，且时觉有热上冲咽喉者，是内伤外感相并而为病也。宜用重剂清其胃腑之热，而少佐以解表之品，表解里清，喉之疼痛当自愈矣。", "diag": "此证脉象犹浮，舌苔犹白，盖得病甫二日，表证犹未罢也。而右关重按有力，且时觉有热上冲咽喉者，是内伤外感相并而为病也。宜用重剂清其胃腑之热，而少佐以解表之品，表解里清，喉之疼痛当自愈矣。", "herbs": ["阿斯匹林"], "formula": "白虎/清热类"}, {"id": "29765", "title": "案#29765", "left": "", "right": "右寸浮尤甚", "rate": "", "pulse_raw": "其两手乱动不休者，肝风已 动也 。病势至此，危险已至极点。幸喜脉浮为病还在太阳，右寸浮尤甚，又为将汗之兆。其所以将汗而不汗者，人身之有汗，如天地之有雨，天地阴阳和而后雨，人身亦阴阳和而后汗。此证两尺脉甚弱，阳升而阴不应，是以不能作汗。当用大滋真阴之品，济阴以应其阳必", "diag": "此证两目清白无火，而竟无所见者，肾阴将竭也。其两手乱动不休者，肝风已 动也 。病势至此，危险已至极点。幸喜脉浮为病还在太阳，右寸浮尤甚，又为将汗之兆。其所以将汗而不汗者，人身之有汗，如天地之有雨，天地阴阳和而后雨，人身亦阴阳和而后汗。此证两", "herbs": ["熟怀地黄", "生怀山药", "玄参", "大甘枸杞", "甘草", "真阿胶"], "formula": "滋阴凉血类"}, {"id": "29766", "title": "案#29766", "left": "左右皆洪滑有力，一分钟九十八至", "right": "右皆洪滑有力", "rate": "", "pulse_raw": "其左边有如榆荚一块发白。自言不惟饮食疼难下咽，即呼吸亦甚觉有碍。诊其脉左右皆洪滑有力，一分钟九十八至。愚为刺其少商出血，复为针其合谷，又为拟一清咽、表疹、泻火之方俾服之。", "diag": "", "herbs": ["生石膏", "玄参", "天花粉", "射干", "牛蒡子", "浙贝母"], "formula": "白虎/清热类"}, {"id": "29767", "title": "案#29767", "left": "", "right": "", "rate": "", "pulse_raw": "其温病之热，本不甚剧。因病久真阴亏损致小便不利，所饮之水停于肠胃则胀满，迫于心下则作喘。其心中自觉干甚，固系温病之热未清，亦足征其真阴亏损阴精不能上奉也（《内经》谓阴精上奉，其人寿）。当滋其真阴，利其小便，真阴足则以水济火，而心中自然不干；", "diag": "此其温病之热，本不甚剧。因病久真阴亏损致小便不利，所饮之水停于肠胃则胀满，迫于心下则作喘。其心中自觉干甚，固系温病之热未清，亦足征其真阴亏损阴精不能上奉也（《内经》谓阴精上奉，其人寿）。当滋其真阴，利其小便，真阴足则以水济火，而心中自然不干", "herbs": ["节间细根"], "formula": "通用清热/滋阴类"}, {"id": "29768", "title": "案#29768", "left": "", "right": "", "rate": "一息六至", "pulse_raw": "脉弦细无根，右部 关 脉稍实，一息六至。舌苔薄而微黄，毫无津液。大便四五日一行，颇干燥。", "diag": "此因病久耗阴，阴虚生热，又兼外感之热留滞于阳明之府未尽消也。当以清外感之热为主，而以滋补真阴之药辅之。", "herbs": ["生石膏", "野党参", "生怀地黄", "生怀山药", "生杭芍", "滑石"], "formula": "白虎/清热类"}, {"id": "29769", "title": "案#29769", "left": "左部弦硬而长", "right": "右部洪滑而长", "rate": "", "pulse_raw": "其脉左部弦硬而长，右部洪滑而长，皆重按有力。 此温病之热，已入阳明之府，又兼肝火挟冲气上冲也。是以其左脉弦硬为肝火炽盛，其弦硬而长即为冲脉上冲之现象也；其右脉洪滑，为温热已入阳明胃腑，其洪滑而长，亦冲气上冲之现象也。因冲脉虽居于上", "diag": "", "herbs": ["生石膏", "生赭石", "生龙骨", "生牡蛎", "）白知母", "生杭芍"], "formula": "白虎/清热类"}, {"id": "29770", "title": "案#29770", "left": "左右皆弦而无力", "right": "右皆弦而无力", "rate": "", "pulse_raw": "其脉左右皆弦而无力，数逾五至，知其阴分阳分俱虚，而阴分之虚尤甚也。此当培养其气血而以治疟之药辅之。", "diag": "", "herbs": ["玄参", "知母", "天冬", "潞参", "何首乌", "炙鳖甲"], "formula": "通用清热/滋阴类"}, {"id": "29771", "title": "案#29771", "left": "", "right": "", "rate": "", "pulse_raw": "其心脏受毒菌之麻痹，跳动之机 关 将停，是以脉沉细且迟；其血脉之流通无力，不能达于四肢，是以手足皆凉；其毒菌侵入肠胃，俾肠胃之气化失和，兼以脏腑之正气与侵入之邪气，互相格拒，是以恶心腹疼，吐泻交作；其心中发热者固系夹杂暑气，而霍乱之属 阳者 ，即不夹杂暑", "diag": "此霍乱之毒菌随溽暑之热传入脏腑也。其心脏受毒菌之麻痹，跳动之机 关 将停，是以脉沉细且迟；其血脉之流通无力，不能达于四肢，是以手足皆凉；其毒菌侵入肠胃，俾肠胃之气化失和，兼以脏腑之正气与侵入之邪气，互相格拒，是以恶心腹疼，吐泻交作；其心中发", "herbs": ["离中丹", "益元散"], "formula": "通用清热/滋阴类"}, {"id": "29772", "title": "案#29772", "left": "", "right": "", "rate": "", "pulse_raw": "脉象无火而其实际转大热者，即或脉闭身冷显露寒凉之象，亦不可遽以凉断。此证脉象不见有热，而心中热而且渴，二便尤甚觉热，其为内蕴实热无疑。至其脉不见有热象者，以心脏因受毒麻痹，而机 关 之启闭无力也。拟用大剂寒凉清其内热，而", "diag": "霍乱之证，恒有脉象无火而其实际转大热者，即或脉闭身冷显露寒凉之象，亦不可遽以凉断。此证脉象不见有热，而心中热而且渴，二便尤甚觉热，其为内蕴实热无疑。至其脉不见有热象者，以心脏因受毒麻痹，而机 关 之启闭无力也。拟用大剂寒凉清其内热，而辅以解", "herbs": ["生石膏", "生杭芍", "半夏", "生怀山药", "嫩竹茹", "甘松"], "formula": "白虎/清热类"}, {"id": "29773", "title": "案#29773", "left": "", "right": "", "rate": "", "pulse_raw": "脉闭也。此当用药消其毒菌，清其内热，并以助心房之跳动，虽危险仍可挽回。", "diag": "此证虽身凉脉闭，而心中自觉发热，仍当以热论。其所以身凉脉闭者，因霍乱之毒菌窜入心脏，致心脏行血之机 关 将停，血脉不达于周身，所以内虽蕴热而仍身凉脉闭也。此当用药消其毒菌，清其内热，并以助心房之跳动，虽危险仍可挽回。", "herbs": ["镜面朱砂", "粉甘草", "冰片", "薄荷冰"], "formula": "通用清热/滋阴类"}, {"id": "29774", "title": "案#29774", "left": "左部弦硬", "right": "", "rate": "", "pulse_raw": "其冷甚轻，其热甚剧。恶心懒食，心中时常发热，思食凉物。其脉左部弦硬，右部洪实。大便干燥，小便赤涩，屡次服药无效。", "diag": "此乃肝胆伏有疟邪，胃腑郁有暑热，暑热疟邪相并而为寒热往来，然寒少热多，此方书所谓阳明热疟也。宜祛其肝胆之邪，兼清其胃腑之热。", "herbs": ["生石膏"], "formula": "白虎/清热类"}, {"id": "29775", "title": "案#29775", "left": "左右皆弦者", "right": "右皆弦者", "rate": "", "pulse_raw": "脉，左右皆弦者，病疟之脉，大抵如此。其左关独弦而有力者，其病根在肝胆也。 为肝胆有外受之邪是以脉现弦象，而病疟为其所受之邪为外感之热邪，是以左关脉象弦而有力，其热下迫肠中而下痢。拟清肝胆之热，散其外感之邪，则疟痢庶可同愈。", "diag": "此证之脉，左右皆弦者，病疟之脉，大抵如此。其左关独弦而有力者，其病根在肝胆也。 为肝胆有外受之邪是以脉现弦象，而病疟为其所受之邪为外感之热邪，是以左关脉象弦而有力，其热下迫肠中而下痢。拟清肝胆之热，散其外感之邪，则疟痢庶可同愈。", "herbs": ["生杭芍", "山楂片", "茵陈", "生麦芽", "柴胡", "常山"], "formula": "通用清热/滋阴类"}, {"id": "29776", "title": "案#29776", "left": "", "right": "", "rate": "", "pulse_raw": "其所脱者元气也。凡元气之上脱必由于肝（所以人之将脱者，肝风先动），当用酸敛之品直趋肝脏以收敛之。即所以杜塞元气上脱之路，再用补助气分之药辅之。虽病势垂危至极点，亦可挽回性命于呼吸之间。", "diag": "此证若系陈病状况，至此定难挽回，惟因霍乱吐泻已极，又复流产，则气血暴脱，故仍可用药挽救。夫暴脱之证，其所脱者元气也。凡元气之上脱必由于肝（所以人之将脱者，肝风先动），当用酸敛之品直趋肝脏以收敛之。即所以杜塞元气上脱之路，再用补助气分之药辅之", "herbs": ["净杭萸肉", "野党参", "生怀山药"], "formula": "固脱救逆类"}, {"id": "29777", "title": "案#29777", "left": "", "right": "", "rate": "", "pulse_raw": "其脉虽甚虚弱，仍现滑象，至数未改，惟左 关 微浮，稍似有力。", "diag": "恶阻呕吐，原妊妇之常，兹因左关独浮而有力，知系肝气胆火上冲，是以呕吐特甚。有谓恶阻呕吐虽甚剧无碍者，此未有阅历之言。愚自行道以来，耳闻目睹，因此证偾事者已有多人，甚勿忽视。此宜急治以镇肝降胃之品，不可因其受妊而不敢放胆用药也。", "herbs": ["生赭石", "党参", "生怀山药", "生怀地黄", "生杭芍", "大甘枸杞"], "formula": "降胃镇冲类"}, {"id": "29778", "title": "案#29778", "left": "", "right": "", "rate": "", "pulse_raw": "其喘，屡次用麻黄发之。致其元气将脱，又兼外感之热已入阳明。其实热与外感之气相并上冲，是以其脉上盛下虚，喘逆若斯迫促，脉七至即为绝脉，今竟八至恐难挽回。欲辞不治而病家再三恳求，遂勉为拟方。以清其热，止其喘，挽救其气化之将脱。", "diag": "此证前因医者欲治其喘，屡次用麻黄发之。致其元气将脱，又兼外感之热已入阳明。其实热与外感之气相并上冲，是以其脉上盛下虚，喘逆若斯迫促，脉七至即为绝脉，今竟八至恐难挽回。欲辞不治而病家再三恳求，遂勉为拟方。以清其热，止其喘，挽救其气化之将脱。", "herbs": ["净萸肉", "生怀地黄", "生龙骨", "生牡蛎"], "formula": "白虎/清热类"}, {"id": "29779", "title": "案#29779", "left": "", "right": "", "rate": "", "pulse_raw": "脉象观之，不但阳明胃府之热甚实，即肝胆之热亦甚盛。想其未病之前必曾怒动肝火，若不急清其热，势将迫血妄行，危险即在目前。治以白虎加人参汤，以白虎汤解其热，加参以保其胎，遂为疏方俾急服之。", "diag": "据此证状脉象观之，不但阳明胃府之热甚实，即肝胆之热亦甚盛。想其未病之前必曾怒动肝火，若不急清其热，势将迫血妄行，危险即在目前。治以白虎加人参汤，以白虎汤解其热，加参以保其胎，遂为疏方俾急服之。", "herbs": ["生石膏", "野党参", "生怀地黄", "生怀山药", "生杭芍", "甘草"], "formula": "白虎/清热类"}, {"id": "29780", "title": "案#29780", "left": "左部沉弦", "right": "右部沉涩", "rate": "一息四至", " // 脉象芯片点击
document.querySelectorAll('.pulse-chip').forEach(chip => {{
    chip.addEventListener('click', () => {{
        chip.classList.toggle('selected');
        searchCases();
    }});
}});

// 下拉框变化自动搜索
document.getElementById('leftPulse').addEventListener('change', searchCases);
document.getElementById('rightPulse').addEventListener('change', searchCases);
document.getElementById('formulaFamily').addEventListener('change', searchCases);

function getSelectedTypes() {{
    return Array.from(document.querySelectorAll('.pulse-chip.selected')).map(c => c.dataset.val);
}}

function searchCases() {{
    const leftVal = document.getElementById('leftPulse').value;
    const rightVal = document.getElementById('rightPulse').value;
    const formulaVal = document.getElementById('formulaFamily').value;
    const selectedTypes = getSelectedTypes();
    
    let filtered = cases.filter(c => {{
        if (leftVal && !c.left.includes(leftVal)) return false;
        if (rightVal && !c.right.includes(rightVal)) return false;
        if (formulaVal && c.formula !== formulaVal) return false;
        if (selectedTypes.length > 0) {{
            const combined = (c.left + ' ' + c.right + ' ' + c.pulse_raw);
            if (!selectedTypes.every(t => combined.includes(t))) return false;
        }}
        return true;
    }});
    
    document.getElementById('matchInfo').textContent = `${{filtered.length}} / ${{cases.length}} 案`;
    document.getElementById('resultCount').textContent = `(${{filtered.length}}案)`;
    
    // 快速统计
    let famCounts = {{}};
    filtered.forEach(c => {{ famCounts[c.formula] = (famCounts[c.formula] || 0) + 1; }});
    const famStr = Object.entries(famCounts).map(([k,v]) => `<span class="tag">${{k}}:${{v}}</span>`).join(' ');
    document.getElementById('quickStats').innerHTML = famStr;
    
    const resultsDiv = document.getElementById('results');
    if (filtered.length === 0) {{
        resultsDiv.innerHTML = '<div class="empty">无匹配医案，请调整筛选条件</div>';
        return;
    }}
    
    if (filtered.length > 50) {{
        resultsDiv.innerHTML = `<div class="empty">匹配 ${{filtered.length}} 案，数量较多，请进一步细化筛选条件</div>`;
        return;
    }}
    
    resultsDiv.innerHTML = filtered.map(c => `
        <div class="result-card">
            <h3>#${{c.id}} ${{c.title}}</h3>
            ${{c.left ? `<div class="pulse-high">◀ 左脉：${{c.left}}</div>` : ''}}
            ${{c.right ? `<div class="pulse-high">▶ 右脉：${{c.right}}</div>` : ''}}
            ${{c.rate ? `<div class="pulse">脉率：${{c.rate}}</div>` : ''}}
            <div class="pulse">${{c.pulse_raw.substring(0, 140)}}</div>
            ${{c.diag ? `<div class="pulse"><strong>病机：</strong>${{c.diag.substring(0, 100)}}</div>` : ''}}
            <div class="formula">
                <strong>${{c.formula || '通用'}}</strong>
                ${{c.herbs && c.herbs.length ? ' | ' + c.herbs.slice(0,8).map(h => `<span class="tag">${{h}}</span>`).join(' ') : ''}}
            </div>
        </div>
    `).join('');
}}

function resetFilters() {{
    document.getElementById('leftPulse').value = '';
    document.getElementById('rightPulse').value = '';
    document.getElementById('formulaFamily').value = '';
    document.querySelectorAll('.pulse-chip.selected').forEach(c => c.classList.remove('selected'));
    document.getElementById('results').innerHTML = '<div class="empty">请选择脉象特征，点击关键词或下拉框即开始匹配</div>';
    document.getElementById('matchInfo').textContent = '';
    document.getElementById('resultCount').textContent = '';
    document.getElementById('quickStats').innerHTML = '';
}}

// 初始化
document.addEventListener('DOMContentLoaded', () => {{
    const lCount = new Set(cases.filter(c => c.left).map(c => c.left.substring(0,10))).size;
    const rCount = new Set(cases.filter(c => c.right).map(c => c.right.substring(0,10))).size;
    document.getElementById('totalLrPatterns').textContent = `${{lCount}}/${{rCount}}`;
    
    const allHerbs = new Set();
    cases.forEach(c => c.herbs && c.herbs.forEach(h => allHerbs.add(h)));
    document.getElementById('totalHerbs').textContent = allHerbs.size;
    
    const allFams = new Set(cases.map(c => c.formula));
    document.getElementById('totalFamilies').textContent = allFams.size;
    
    document.getElementById('results').innerHTML = '<div class="empty">📖 选择脉象特征后自动筛选原著医案<br><span style="font-size:0.8em;">124案脉诊数据 · 8大方剂家族 · 每分支均有原著锚点</span></div>';
}});
