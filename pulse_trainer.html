<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知医邦 · 脉象量化训练</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #1e293b; border-bottom: 1px solid #334155; }
  .topbar h1 { font-size: 1.2rem; color: #38bdf8; }
  .topbar a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
  .topbar a:hover { color: #e2e8f0; }
  .mode-bar { display: flex; gap: 8px; padding: 10px 20px; background: #1a2332; border-bottom: 1px solid #334155; overflow-x: auto; }
  .mode-btn { padding: 8px 18px; border-radius: 6px; border: 1px solid #475569; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.9rem; white-space: nowrap; transition: all .2s; }
  .mode-btn.active { background: #1d4ed8; color: #fff; border-color: #3b82f6; }
  .mode-btn:hover:not(.active) { border-color: #64748b; color: #e2e8f0; }
  .container { max-width: 900px; margin: 0 auto; padding: 16px; }

  /* 浏览模式 */
  .cat-section { margin-bottom: 24px; }
  .cat-title { font-size: 1rem; color: #38bdf8; padding: 8px 0; border-bottom: 1px solid #334155; margin-bottom: 10px; }
  .pulse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .pulse-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 14px; cursor: pointer; transition: all .2s; }
  .pulse-card:hover { border-color: #3b82f6; transform: translateY(-1px); }
  .pulse-card .name { font-size: 1.1rem; font-weight: bold; color: #f1f5f9; }
  .pulse-card .rate { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
  .pulse-card .grades { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
  .pulse-card .dx { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .pulse-card .dx span { font-size: 0.75rem; background: #334155; color: #cbd5e1; padding: 2px 8px; border-radius: 10px; }

  /* 训练模式 */
  .train-panel { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 24px; }
  .stats { display: flex; gap: 20px; margin-bottom: 20px; font-size: 0.9rem; }
  .stats div { background: #0f172a; padding: 10px 18px; border-radius: 8px; }
  .stats span { color: #38bdf8; font-weight: bold; font-size: 1.2rem; }
  .question { font-size: 1.05rem; line-height: 1.8; margin-bottom: 20px; padding: 16px; background: #0f172a; border-radius: 8px; border-left: 3px solid #38bdf8; }
  .question .label { font-size: 0.8rem; color: #64748b; margin-bottom: 6px; }
  .question .q-content { color: #e2e8f0; }
  .question .q-content b { color: #38bdf8; }
  .options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .option-btn { padding: 12px; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: #e2e8f0; cursor: pointer; font-size: 1rem; text-align: center; transition: all .2s; }
  .option-btn:hover { border-color: #3b82f6; background: #1e293b; }
  .option-btn.correct { border-color: #22c55e; background: #14532d; color: #86efac; }
  .option-btn.wrong { border-color: #ef4444; background: #7f1d1d; color: #fca5a5; }
  .option-btn:disabled { pointer-events: none; }
  .feedback { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.9rem; line-height: 1.6; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #064e3b; border: 1px solid #22c55e; color: #86efac; }
  .feedback.wrong { background: #450a0a; border: 1px solid #ef4444; color: #fca5a5; }
  .next-btn { margin-top: 12px; padding: 10px 24px; border-radius: 6px; background: #1d4ed8; color: #fff; border: none; cursor: pointer; font-size: 0.9rem; display: none; }
  .next-btn.show { display: inline-block; }
  .next-btn:hover { background: #2563eb; }

  /* 详情弹出 */
  .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .detail-card { background: #1e293b; border: 1px solid #475569; border-radius: 12px; padding: 24px; max-width: 460px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .detail-card h2 { color: #38bdf8; margin-bottom: 12px; }
  .detail-card .row { margin: 8px 0; font-size: 0.9rem; }
  .detail-card .row b { color: #94a3b8; }
  .detail-card .dx-list { margin-top: 10px; }
  .detail-card .dx-list span { display: inline-block; background: #334155; color: #cbd5e1; padding: 3px 10px; border-radius: 10px; margin: 2px 4px 2px 0; font-size: 0.8rem; }
  .detail-close { float: right; background: none; border: none; color: #94a3b8; font-size: 1.4rem; cursor: pointer; }
</style>
</head>
<body>

<div class="topbar">
  <h1>🔬 知医邦 · 脉象量化训练</h1>
  <a href="index.html">← 返回诊断</a>
</div>

<div class="mode-bar">
  <button class="mode-btn active" onclick="switchMode('browse')">📖 浏览脉象库</button>
  <button class="mode-btn" onclick="switchMode('train')">🎯 训练模式</button>
</div>

<div class="container" id="app"></div>

<script>
// ========== 状态 ==========
var DB = {};
var mode = 'browse';
var stats = { total: 0, correct: 0, wrong: 0 };
var currentQ = null;
var answered = false;

// ========== 数据加载 ==========
fetch('pulse_db.json')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    DB = d;
    render();
  })
  .catch(function(e) {
    document.getElementById('app').innerHTML = '<p style="color:#ef4444">数据加载失败: ' + e.message + '</p>';
  });

function switchMode(m) {
  mode = m;
  answered = false;
  document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');
  render();
}

// ========== 类别分组 ==========
function groupByCategory() {
  var groups = {};
  Object.keys(DB).forEach(function(k) {
    var cat = DB[k].category || '其他';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push({ name: k, data: DB[k] });
  });
  return groups;
}

// ========== 渲染 ==========
function render() {
  var el = document.getElementById('app');
  if (Object.keys(DB).length === 0) { el.innerHTML = '<p>加载中...</p>'; return; }
  if (mode === 'browse') renderBrowse(el);
  else renderTrain(el);
}

// ========== 浏览模式 ==========
function renderBrowse(el) {
  var groups = groupByCategory();
  var html = '';
  Object.keys(groups).forEach(function(cat) {
    html += '<div class="cat-section"><div class="cat-title">' + cat + '</div><div class="pulse-grid">';
    groups[cat].forEach(function(p) {
      var dxTags = (p.data.diagnosis || []).map(function(d) { return '<span>' + d + '</span>'; }).join('');
      html += '<div class="pulse-card" onclick="showDetail(\'' + p.name + '\')">' +
        '<div class="name">' + p.name + '</div>' +
        '<div class="rate">📏 ' + (p.data.rate || '—') + '</div>' +
        '<div class="grades">📊 ' + (p.data.grades || []).join(' · ') + '</div>' +
        '<div class="dx">' + dxTags + '</div>' +
      '</div>';
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
}

// ========== 详情弹出 ==========
function showDetail(name) {
  var d = DB[name];
  if (!d) return;
  var dxTags = (d.diagnosis || []).map(function(x) { return '<span>' + x + '</span>'; }).join('');
  var overlay = document.createElement('div');
  overlay.className = 'detail-overlay';
  overlay.innerHTML = '<div class="detail-card">' +
    '<button class="detail-close" onclick="this.parentElement.parentElement.remove()">×</button>' +
    '<h2>' + name + '</h2>' +
    '<div class="row"><b>分类：</b>' + (d.category || '—') + '</div>' +
    '<div class="row"><b>标准范围：</b>' + (d.rate || '—') + '</div>' +
    '<div class="row"><b>分级：</b>' + (d.grades || []).join(' · ') + '</div>' +
    '<div class="row dx-list"><b>临证意义：</b></div>' +
    '<div>' + dxTags + '</div>' +
  '</div>';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

// ========== 训练模式 ==========
function renderTrain(el) {
  var html = '';
  html += '<div class="stats">' +
    '<div>总题：<span>' + stats.total + '</span></div>' +
    '<div>✅ 正确：<span>' + stats.correct + '</span></div>' +
    '<div>❌ 错误：<span>' + stats.wrong + '</span></div>' +
    '<div>正确率：<span>' + (stats.total > 0 ? Math.round(stats.correct / stats.total * 100) + '%' : '—') + '</span></div>' +
  '</div>';
  html += '<div class="train-panel">';

  if (!currentQ || answered) {
    // 生成新题
    var names = Object.keys(DB);
    var correctIdx = Math.floor(Math.random() * names.length);
    var correctName = names[correctIdx];
    var correctData = DB[correctName];

    // 构造干扰项（同category优先）
    var sameCat = names.filter(function(n) { return n !== correctName && DB[n].category === correctData.category; });
    var otherCat = names.filter(function(n) { return n !== correctName && DB[n].category !== correctData.category; });
    var distractors = [];
    // 随机选3个干扰项，优先同类别
    var pool = sameCat.concat(otherCat);
    for (var i = pool.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = pool[i]; pool[i] = pool[j]; pool[j] = t; }
    for (var i = 0; i < 3 && i < pool.length; i++) distractors.push(pool[i]);

    var options = [correctName].concat(distractors);
    for (var i = options.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t2 = options[i]; options[i] = options[j]; options[j] = t2; }

    currentQ = { correct: correctName, data: correctData, options: options };
    answered = false;
  }

  var q = currentQ;
  // 类型1: 给出特征 → 选脉名
  var dxText = (q.data.diagnosis || []).join('；');
  var gradesText = (q.data.grades || []).join('、');

  html += '<div class="question">' +
    '<div class="label">🎯 根据以下特征识别脉象：</div>' +
    '<div class="q-content">' +
    '<b>分类：</b>' + (q.data.category || '—') + '<br>' +
    '<b>脉率：</b>' + (q.data.rate || '—') + '<br>' +
    '<b>分级：</b>' + gradesText + '<br>' +
    '<b>临证：</b>' + dxText +
    '</div></div>';

  html += '<div class="options" id="options">';
  q.options.forEach(function(n) {
    html += '<button class="option-btn" onclick="answer(\'' + n + '\')">' + n + '</button>';
  });
  html += '</div>';

  html += '<div class="feedback" id="feedback"></div>';
  html += '<button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>';

  el.innerHTML = html;
}

function answer(guessedName) {
  if (answered) return;
  answered = true;
  stats.total++;

  var isCorrect = (guessedName === currentQ.correct);
  if (isCorrect) stats.correct++; else stats.wrong++;

  // 高亮
  var btns = document.querySelectorAll('.option-btn');
  btns.forEach(function(b) {
    b.disabled = true;
    if (b.textContent === currentQ.correct) b.classList.add('correct');
    else if (b.textContent === guessedName && !isCorrect) b.classList.add('wrong');
  });

  // 反馈
  var fb = document.getElementById('feedback');
  fb.classList.add('show');
  if (isCorrect) {
    fb.classList.add('correct');
    fb.innerHTML = '✅ 正确！<b>' + currentQ.correct + '</b> ' +
      '【' + currentQ.data.category + '】' + (currentQ.data.rate || '');
  } else {
    fb.classList.add('wrong');
    fb.innerHTML = '❌ 你选了 <b>' + guessedName + '</b>，正确答案是 <b>' + currentQ.correct + '</b><br>' +
      '<b>辨证要点：</b>' + (currentQ.data.diagnosis || []).join('；');
  }

  var nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('show');
  nextBtn.focus();
}

function nextQuestion() {
  answered = true; // force new question
  render();
}
</script>
</body>
</html>
